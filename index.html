<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 色感智选版</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; padding: 0; font-family: var(--font-main);
            background-color: var(--primary-dark); color: #fff;
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none; z-index: 1000;
        }

        .noise-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        #cursor-follower {
            width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; z-index: 10;
        }
        .page.active { display: flex; animation: fadeIn 1.2s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: #000; }
        .aura-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px); opacity: 0.2; transition: all 4s ease;
        }

        /* 首页设置图标 */
        .settings-btn {
            position: absolute; top: 40px; right: 40px;
            width: 24px; height: 24px; cursor: pointer; opacity: 0.3;
            transition: 0.3s; z-index: 1001;
        }
        .settings-btn:hover { opacity: 1; transform: rotate(45deg); }

        /* 配置页设计 */
        .setup-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 2px;
            width: 100%; max-width: 900px;
            max-height: 85vh; overflow-y: auto;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .setup-container.drag-over {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.01);
        }

        .product-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; position: relative; text-align: center;
        }

        .remove-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.2; }
        .remove-btn:hover { opacity: 1; }

        .preview-circle {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .preview-circle img { width: 100%; height: 100%; object-fit: contain; }

        .card-input {
            width: 100%; background: none; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-align: center; font-size: 0.8rem;
            padding: 5px 0; outline: none; margin-bottom: 15px;
        }

        /* 颜色选择器 */
        .color-picker {
            display: flex; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .color-option {
            width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .color-option.active { transform: scale(1.3); border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .add-card {
            border: 1px dashed rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; min-height: 200px; opacity: 0.5;
        }
        .add-card:hover { opacity: 1; border-color: rgba(255,255,255,0.3); }

        .scan-viewport {
            width: 100%; max-width: 480px; aspect-ratio: 3/4;
            background: #000; position: relative; overflow: hidden;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; }

        .result-container {
            display: grid; grid-template-columns: 1.2fr 0.8fr;
            gap: 80px; max-width: 1200px; width: 100%; align-items: center;
        }
        .art-box { width: 100%; aspect-ratio: 3/4; background: #0d0d0f; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        #art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px 40px; font-size: 0.65rem;
            letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: 0.5s;
        }
        .btn:hover { background: #fff; color: #000; }

        #fortune-title { font-family: var(--font-serif); font-size: 3rem; font-weight: 200; margin: 0; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 20px 0; opacity: 0.8; }
        #reason { font-size: 0.85rem; line-height: 2.4; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>

    <!-- 1. 配置页 -->
    <div id="setup-page" class="page active">
        <div class="setup-container">
            <h2 style="font-family:var(--font-serif); letter-spacing:10px; margin-bottom:40px; text-align:center;">色感智选配置</h2>
            <div class="product-list" id="product-list">
                <div class="add-card" onclick="addNewProduct()">
                    <span style="font-size:1.5rem; margin-bottom:10px;">+</span>
                    <span style="font-size:0.5rem; letter-spacing:2px;">添加产品</span>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="btn" onclick="saveAllSetup()">进入首页</button>
            </div>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <!-- 设置图标 -->
        <svg class="settings-btn" onclick="showPage('setup')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" />
        </svg>

        <h1 style="font-family:var(--font-serif); font-size:5rem; letter-spacing:2rem; padding-left:2rem; font-weight:200;">灵犀感知</h1>
        <p style="letter-spacing:12px; opacity:0.4; margin-bottom:60px;">色感共鸣 · 因缘而遇</p>
        <button class="btn" onclick="goToScan()">开启感悟</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:0.3s;"></div>
        </div>
        <p id="progress-val" style="margin-top:40px; font-family:var(--font-serif); letter-spacing:8px;">观色定心...</p>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div id="art-loading" style="text-align:center; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
                    <div class="manifesting-circle" style="width:30px; height:30px; border:1px solid rgba(255,255,255,0.1); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;"></div>
                </div>
                <img id="art-img">
            </div>
            <div class="info-box">
                <span style="font-size:0.6rem; letter-spacing:5px; opacity:0.3;">COLOR RESONANCE // 色感共鸣</span>
                <h2 id="fortune-title">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="margin-top:40px;">重寻色迹</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" accept="image/*" multiple>
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk";
        const pages = {
            setup: document.getElementById('setup-page'),
            setupContainer: document.querySelector('.setup-container'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        
        let products = []; // { id, name, base64, family }
        let isAnalyzing = false;
        let activeFileTarget = null;

        const colorFamilies = [
            { name: "RED", hex: "#FF4D4D" },
            { name: "GREEN", hex: "#4DFF4D" },
            { name: "BLUE", hex: "#4D4DFF" },
            { name: "YELLOW", hex: "#FFFF4D" },
            { name: "ORANGE", hex: "#FF9933" },
            { name: "PURPLE", hex: "#CC33FF" },
            { name: "WHITE", hex: "#FFFFFF" },
            { name: "BLACK", hex: "#333333" }
        ];

        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        // 拖拽上传支持
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            pages.setupContainer.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            pages.setupContainer.addEventListener(eventName, () => pages.setupContainer.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            pages.setupContainer.addEventListener(eventName, () => pages.setupContainer.classList.remove('drag-over'), false);
        });

        pages.setupContainer.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            [...files].forEach(file => {
                if (file.type.startsWith('image/')) {
                    const newId = Date.now() + Math.random();
                    addNewProduct(newId);
                    readFile(file, newId);
                }
            });
        }

        function readFile(file, id) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result.split(',')[1];
                const img = document.getElementById(`img-${id}`);
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById(`label-${id}`).style.display = 'none';
                
                const p = products.find(x => x.id === id);
                p.base64 = base64;
                
                extractPrimaryColor(event.target.result, (hex) => {
                    const family = getColorFamily(hex);
                    manualSetColor(id, family);
                });
            };
            reader.readAsDataURL(file);
        }

        // 产品管理
        function addNewProduct(customId = null) {
            const id = customId || Date.now();
            const card = document.createElement('div');
            card.className = 'product-card';
            card.id = `card-${id}`;
            
            let colorOptionsHtml = colorFamilies.map(f => 
                `<div class="color-option" id="color-${id}-${f.name}" style="background:${f.hex}" onclick="manualSetColor(${id}, '${f.name}')"></div>`
            ).join('');

            card.innerHTML = `
                <span class="remove-btn" onclick="removeProduct(${id})">✕</span>
                <div class="preview-circle" onclick="triggerUploadSingle(${id})">
                    <img id="img-${id}" src="" style="display:none">
                    <span id="label-${id}" style="font-size:0.5rem; opacity:0.2;">上传形象</span>
                </div>
                <input type="text" class="card-input" id="name-${id}" placeholder="产品名称" onchange="updateProductName(${id}, this.value)">
                <div class="color-picker">${colorOptionsHtml}</div>
            `;
            const list = document.getElementById('product-list');
            list.insertBefore(card, list.lastElementChild);
            products.push({ id, name: "", base64: "", family: "WHITE" });
        }

        function triggerUploadSingle(id) {
            activeFileTarget = id;
            document.getElementById('hidden-file').onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    readFile(e.target.files[0], activeFileTarget);
                }
            };
            document.getElementById('hidden-file').click();
        }

        function manualSetColor(id, family) {
            const p = products.find(x => x.id === id);
            p.family = family;
            
            // UI 反馈
            colorFamilies.forEach(f => {
                const opt = document.getElementById(`color-${id}-${f.name}`);
                if (f.name === family) opt.classList.add('active');
                else opt.classList.remove('active');
            });
        }

        function extractPrimaryColor(src, callback) {
            const tempImg = new Image();
            tempImg.src = src;
            tempImg.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                c.width = 1; c.height = 1;
                ctx.drawImage(tempImg, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                callback(hex);
            };
        }

        function getColorFamily(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            const d = max - min;
            let h;
            if (d === 0) h = 0;
            else if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
            else if (max === g) h = (b - r) / d + 2;
            else if (max === b) h = (r - g) / d + 4;
            h /= 6;
            if (max < 50) return "BLACK";
            if (min > 200) return "WHITE";
            if (h < 0.05 || h > 0.95) return "RED";
            if (h < 0.15) return "ORANGE";
            if (h < 0.25) return "YELLOW";
            if (h < 0.45) return "GREEN";
            if (h < 0.75) return "BLUE";
            return "PURPLE";
        }

        function updateProductName(id, val) { products.find(x => x.id === id).name = val; }
        function removeProduct(id) {
            products = products.filter(x => x.id !== id);
            document.getElementById(`card-${id}`).remove();
        }

        function saveAllSetup() {
            if (products.length === 0 || products.some(p => !p.base64 || !p.name)) {
                alert("请确保产品信息完整");
                return;
            }
            showPage('home');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) { alert("摄像头受限"); }
        }

        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person giving a thumbs-up? If YES, identify the dominant thematic color family in the foreground (clothing or large objects): RED, GREEN, BLUE, YELLOW, ORANGE, PURPLE, WHITE, BLACK. Respond only as: YES, CATEGORY." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                if (text && text.startsWith("YES")) {
                    isAnalyzing = true;
                    const family = text.split(",")[1]?.trim() || "WHITE";
                    triggerSuccess(base64, family);
                } else {
                    setTimeout(detectGestureLoop, 1500);
                }
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function triggerSuccess(userBase64, family) {
            document.getElementById('flash').style.opacity = "1";
            setTimeout(() => {
                document.getElementById('flash').style.opacity = "0";
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                runAnalysis(userBase64, family);
            }, 300);
        }

        function runAnalysis(base64, family) {
            // 在进入结果页前，先清空旧内容
            document.getElementById('fortune-title').innerText = "感应中...";
            document.getElementById('drink-name').innerText = "---";
            document.getElementById('reason').innerText = "正在解读万象之气...";
            
            let matches = products.filter(p => p.family === family);
            let bestMatch = matches.length > 0 ? matches[0] : products[0];

            document.getElementById('fortune-title').innerText = "色感共鸣";
            document.getElementById('drink-name').innerText = bestMatch.name;
            const fColor = colorFamilies.find(f => f.name === bestMatch.family).hex;
            document.getElementById('drink-name').style.color = fColor;
            document.getElementById('reason').innerText = `观君今日气色，正合${bestMatch.name}之韵。`;
            bgGlow.style.background = `radial-gradient(circle, ${fColor}33 0%, transparent 70%)`;
            
            showPage('result');
            generateArt(userBase64, bestMatch);
        }

        async function generateArt(userBase64, matchDrink) {
            const fColor = colorFamilies.find(f => f.name === matchDrink.family).hex;
            const artPrompt = `High-end Traditional Chinese Gongbi painting on silk. CHARACTER: Person from Image 1 as a scholar in ${matchDrink.family} silk robes. PRODUCT: Holding bottle from Image 2. Unified masterpiece.`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: userBase64 } }, { inlineData: { mimeType: "image/jpeg", data: matchDrink.base64 } } ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (genBase64) {
                    const img = document.getElementById('art-img');
                    img.src = `data:image/png;base64,${genBase64}`;
                    img.onload = () => {
                        img.style.display = "block";
                        document.getElementById('art-loading').style.display = "none";
                    };
                }
            } catch (e) { console.log("Fail"); }
        }

        function reset() {
            // 深度重置 UI 状态
            isAnalyzing = false;
            const artImg = document.getElementById('art-img');
            artImg.style.display = 'none';
            artImg.src = ""; // 彻底清空图像源，防止残影
            
            document.getElementById('art-loading').style.display = 'block';
            document.getElementById('fortune-title').innerText = "---";
            document.getElementById('drink-name').innerText = "---";
            document.getElementById('reason').innerText = "---";
            
            showPage('home');
        }

        addNewProduct();
    </script>
</body>
</html>
