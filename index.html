<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 禅意视觉 1.6</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 顶级画廊边框与纹理 */
        body::before {
            content: "";
            position: fixed;
            inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 1000;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 999;
        }

        /* 磁吸光标 */
        #cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1), 
                        width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 10;
        }

        .page.active { display: flex; animation: fadeIn 1.2s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: #000; }
        .aura-glow {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px); opacity: 0.2; transition: all 4s ease;
        }

        /* 配置页设计 */
        .setup-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 60px;
            border-radius: 2px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .input-group { margin-bottom: 40px; text-align: left; }
        .input-group label {
            display: block; font-size: 0.65rem; letter-spacing: 4px;
            margin-bottom: 20px; opacity: 0.4; text-transform: uppercase;
        }

        .input-group input[type="text"] {
            width: 100%; background: none; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 15px 0; font-size: 1.1rem;
            letter-spacing: 2px; transition: border-color 0.5s;
        }
        .input-group input:focus { border-color: #fff; outline: none; }

        .product-preview-box {
            width: 100%; height: 180px; border: 1px dashed rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px; cursor: pointer; transition: 0.5s;
        }
        .product-preview-box:hover { border-color: rgba(255,255,255,0.4); }
        .product-preview-box img { max-height: 100%; object-fit: contain; }

        /* 首页设计 */
        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(3.5rem, 12vw, 6rem);
            letter-spacing: 3rem; font-weight: 200;
            margin-bottom: 40px; padding-left: 3rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.3) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 结果页黄金比例排版 */
        .result-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 100px;
            max-width: 1300px;
            width: 100%;
            align-items: center;
        }

        .art-box {
            width: 100%; aspect-ratio: 3/4; background: #0d0d0f;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #art-img {
            width: 100%; height: 100%; object-fit: cover;
            display: none; animation: imageReveal 3s ease;
        }

        .info-box { padding-right: 40px; }
        .ver-tag {
            writing-mode: vertical-rl;
            position: absolute; left: 40px; top: 40px;
            font-size: 0.6rem; letter-spacing: 5px; opacity: 0.3;
        }

        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 18px 45px; font-size: 0.65rem;
            letter-spacing: 6px; text-transform: uppercase;
            cursor: pointer; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn:hover { background: #fff; color: #000; border-color: #fff; transform: translateY(-5px); }

        .manifesting-circle {
            width: 45px; height: 45px; border: 1px solid rgba(255,255,255,0.05);
            border-top-color: rgba(255,255,255,0.5); border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #fortune-title { font-family: var(--font-serif); font-size: 3.5rem; margin: 0; font-weight: 200; }
        #drink-name { font-family: var(--font-serif); font-size: 1.8rem; margin: 30px 0; font-weight: 200; opacity: 0.8; }
        #reason { font-size: 0.9rem; line-height: 2.6; opacity: 0.4; text-align: justify; font-weight: 300; }

        @keyframes imageReveal {
            from { opacity: 0; filter: blur(40px) brightness(1.5); }
            to { opacity: 1; filter: blur(0) brightness(1); }
        }

        .scan-viewport {
            width: 100%; max-width: 480px; aspect-ratio: 3/4;
            background: #000; position: relative; overflow: hidden;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; filter: sepia(0.2); }

        .side-text {
            position: fixed; right: 40px; bottom: 40px;
            font-size: 0.6rem; letter-spacing: 4px; opacity: 0.2;
            writing-mode: vertical-rl;
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>
    
    <div class="ver-tag">ZEN VISION // PROMO</div>
    <div class="side-text">PROJECT YINLIAO v 1.6</div>

    <!-- 1. 配置页 -->
    <div id="setup-page" class="page active">
        <div class="setup-box">
            <h2 style="font-family:var(--font-serif); font-weight:200; letter-spacing:12px; margin-bottom:50px; opacity:0.8;">产品心领配置</h2>
            
            <div class="input-group">
                <label>专属产品形象 // UPLOAD</label>
                <div class="product-preview-box" onclick="document.getElementById('setup-file').click()">
                    <img id="setup-preview" src="" style="display:none">
                    <span id="setup-placeholder" style="opacity:0.3; font-size:0.65rem; letter-spacing:3px;">点击上传高清实物图</span>
                </div>
                <input type="file" id="setup-file" style="display:none" accept="image/*" onchange="handleSetupUpload(this)">
            </div>

            <div class="input-group">
                <label>产品鸣应名称 // NAME</label>
                <input type="text" id="setup-name" placeholder="请输入完整产品名称">
            </div>

            <button class="btn" onclick="saveSetup()">保存并开启感悟</button>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <h1 style="margin-bottom:60px;">灵犀感知</h1>
        <p style="letter-spacing:18px; opacity:0.4; font-size:0.8rem; margin-bottom:80px; text-transform:uppercase;">万物气韵 · 映照本心</p>
        <button class="btn" onclick="goToScan()">开启感悟</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:0.3s; z-index:100;"></div>
        </div>
        <p id="progress-val" style="margin-top:50px; font-family:var(--font-serif); letter-spacing:8px; font-size:0.9rem;">等待缘起</p>
        <p style="font-size:0.65rem; letter-spacing:4px; opacity:0.3; line-height:2; text-align:center;">请面对镜头，举起大拇指<br>感应品牌之气...</p>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div id="art-loading" style="text-align: center; z-index: 10; position:absolute;">
                    <div class="manifesting-circle" style="margin: 0 auto;"></div>
                    <p style="margin-top:20px; font-size:0.6rem; letter-spacing:4px; opacity:0.3;">丹青挥毫中...</p>
                </div>
                <img id="art-img">
            </div>
            <div class="info-box">
                <span style="font-size:0.6rem; letter-spacing:6px; opacity:0.4; text-transform:uppercase; margin-bottom:20px; display:block;">Soul Resonance // 鸣应</span>
                <h2 id="fortune-title">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="margin-top:50px;">重寻宿命</button>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk"; 
        const pages = {
            setup: document.getElementById('setup-page'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        const progressVal = document.getElementById('progress-val');
        
        let isAnalyzing = false;
        let setupProductBase64 = "";
        let setupProductName = "";

        // 磁吸光标逻辑
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            bgGlow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        function handleSetupUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    setupProductBase64 = e.target.result.split(',')[1];
                    document.getElementById('setup-preview').src = e.target.result;
                    document.getElementById('setup-preview').style.display = 'block';
                    document.getElementById('setup-placeholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveSetup() {
            setupProductName = document.getElementById('setup-name').value;
            if (!setupProductBase64 || !setupProductName) {
                alert("请先上传产品形象并输入名称");
                return;
            }
            showPage('home');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            progressVal.innerText = "正在观照...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) { alert("请允许摄像头权限"); }
        }

        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person in the image giving a thumbs-up gesture? Respond ONLY with 'YES' or 'NO'." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                if (text && text.includes("YES")) {
                    isAnalyzing = true;
                    document.getElementById('flash').style.opacity = "1";
                    progressVal.innerText = "灵犀已通";
                    setTimeout(() => {
                        document.getElementById('flash').style.opacity = "0";
                        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                        runAnalysis(base64);
                    }, 300);
                } else {
                    setTimeout(detectGestureLoop, 1500);
                }
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function runAnalysis(base64) {
            const data = {
                "fortuneTitle": "万象生辉",
                "hexCode": "#E6B800",
                "drinkName": setupProductName,
                "reason": `此物气韵与阁下本心鸣应。${setupProductName}之香，如林间初雨，透彻且深远。手持此瓶，即是执一份清醒，照见灵犀。`
            };

            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            const drink = document.getElementById('drink-name');
            drink.innerText = data.drinkName;
            drink.style.color = data.hexCode;
            document.getElementById('reason').innerText = data.reason;
            bgGlow.style.background = `radial-gradient(circle, ${data.hexCode}33 0%, transparent 70%)`;
            
            showPage('result');
            generateArt(base64);
        }

        async function generateArt(userBase64) {
            // 顶级融合指令：强化古装、意境与实物复刻
            const artPrompt = `This is a high-end masterpiece of Traditional Chinese Gongbi (meticulous style) painting on weathered silk. 
            CHARACTER: Replicate the person from Image 1 with 100% similarity, but transform them into an ancient scholar. They are wearing elaborate, flowing Tang Dynasty silk robes with fine embroidery. 
            PRODUCT INTEGRATION: The character is elegantly cradling the beverage bottle from Image 2 as if it were a rare jade vessel. You MUST faithfully replicate the bottle's shape (tapered shoulder, white cap) and its distinctive green label into the Gongbi aesthetic. 
            ATMOSPHERE: A peaceful Zen landscape with misty mountains, gnarled pines, and ethereal light. 
            STYLE: Exquisite ink outlines, soft mineral pigments, poetic antique vibe. The bottle and character must feel like a single, unified artistic creation.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ 
                                { text: artPrompt }, 
                                { inlineData: { mimeType: "image/jpeg", data: userBase64 } }, // 图 1：人物
                                { inlineData: { mimeType: "image/jpeg", data: setupProductBase64 } } // 图 2：产品标准
                            ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (genBase64) {
                    const artImg = document.getElementById('art-img');
                    artImg.src = `data:image/png;base64,${genBase64}`;
                    artImg.onload = () => {
                        artImg.style.display = "block";
                        document.getElementById('art-loading').style.display = "none";
                    };
                }
            } catch (e) { console.log("Art failed"); }
        }

        function reset() {
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('art-loading').style.display = 'block';
            showPage('home');
        }
    </script>
</body>
</html>
