<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 环球寻色之旅</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; padding: 0; font-family: var(--font-main);
            background-color: var(--primary-dark); color: #fff;
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none; z-index: 1000;
        }

        .noise-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        #cursor-follower {
            width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; z-index: 10;
        }
        .page.active { display: flex; animation: fadeIn 1.2s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: #000; }
        .aura-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px); opacity: 0.2; transition: all 4s ease;
        }

        .settings-btn {
            position: absolute; top: 40px; right: 40px;
            width: 24px; height: 24px; cursor: pointer; opacity: 0.3;
            transition: 0.3s; z-index: 1001;
        }
        .settings-btn:hover { opacity: 1; transform: rotate(45deg); }

        /* 配置页 */
        .setup-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 2px;
            width: 100%; max-width: 900px;
            max-height: 85vh; overflow-y: auto;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .setup-container.drag-over { background: rgba(255,255,255,0.05); border-color: #fff; transform: scale(1.01); }

        .product-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .product-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; position: relative; text-align: center;
        }
        .remove-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.2; }
        .preview-circle {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .preview-circle img { width: 100%; height: 100%; object-fit: contain; }
        .card-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-align: center; font-size: 0.8rem; padding: 5px 0; outline: none; margin-bottom: 15px;
        }
        .color-picker { display: flex; justify-content: center; gap: 8px; }
        .color-option { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .color-option.active { transform: scale(1.4); border-color: #fff; }

        .add-card { border: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 180px; opacity: 0.5; }

        /* 结果页黄金排版 */
        .result-container {
            display: grid; grid-template-columns: 1.1fr 0.9fr;
            gap: 80px; max-width: 1200px; width: 100%; align-items: center;
        }
        .art-box { width: 100%; aspect-ratio: 3/4; background: #000; position: relative; overflow: hidden; }
        #art-img { width: 100%; height: 100%; object-fit: cover; display: none; animation: reveal 2s ease; }
        @keyframes reveal { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px 40px; font-size: 0.65rem;
            letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: 0.5s;
        }
        .btn:hover { background: #fff; color: #000; }

        #dest-name { font-family: var(--font-serif); font-size: 3.5rem; font-weight: 200; margin: 0; line-height: 1.2; }
        #drink-name { font-family: var(--font-main); font-size: 1rem; letter-spacing: 8px; margin: 25px 0; opacity: 0.6; text-transform: uppercase; }
        #reason { font-size: 0.9rem; line-height: 2.2; opacity: 0.4; text-align: justify; }

        .scan-viewport {
            width: 100%; max-width: 480px; aspect-ratio: 3/4;
            background: #000; position: relative; overflow: hidden;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>

    <!-- 1. 配置页 -->
    <div id="setup-page" class="page active">
        <div class="setup-container">
            <h2 style="font-family:var(--font-serif); letter-spacing:10px; margin-bottom:40px; text-align:center; font-weight:200;">品牌产品配置</h2>
            <div class="product-list" id="product-list">
                <div class="add-card" onclick="addNewProduct()">
                    <span style="font-size:1.5rem;">+</span>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="btn" onclick="saveAllSetup()">进入寻色之旅</button>
            </div>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <svg class="settings-btn" onclick="showPage('setup')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        <h1 style="font-family:var(--font-serif); font-size:4rem; letter-spacing:1.5rem; font-weight:200;">灵犀感知</h1>
        <p style="letter-spacing:10px; opacity:0.4; margin-bottom:60px;">寻全球之色 · 遇此间清爽</p>
        <button class="btn" onclick="goToScan()">开启寻色</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:0.3s;"></div>
        </div>
        <p id="progress-val" style="margin-top:40px; font-family:var(--font-serif); letter-spacing:8px; opacity:0.6;">正在感知气场色调...</p>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div id="art-loading" style="text-align:center; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
                    <div class="circle-spin" style="width:30px; height:30px; border:1px solid rgba(255,255,255,0.1); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;"></div>
                </div>
                <img id="art-img">
            </div>
            <div class="info-box">
                <span style="font-size:0.6rem; letter-spacing:5px; opacity:0.3; display:block; margin-bottom:15px;">DESTINATION RESONANCE // 寻色全球</span>
                <h2 id="dest-name">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="margin-top:40px;">重寻色迹</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" accept="image/*" multiple>
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk";
        const pages = {
            setup: document.getElementById('setup-page'),
            setupContainer: document.querySelector('.setup-container'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        
        let products = [];
        let isAnalyzing = false;
        let activeFileTarget = null;

        // 全球目的地场景库
        const destinationMap = {
            RED: ["中国 故宫红墙", "意大利 罗马斗兽场", "摩洛哥 马拉喀什红城", "印度 泰姬陵晚霞"],
            ORANGE: ["澳大利亚 乌鲁鲁巨石", "美国 大峡谷日落", "土耳其 卡帕多奇亚热气球"],
            YELLOW: ["埃及 金字塔撒哈拉", "缅甸 蒲甘金色佛塔", "法国 普罗旺斯向日葵"],
            GREEN: ["新西兰 皇后镇绿野", "瑞士 阿尔卑斯山地", "中国 张家界仙境", "冰岛 极光森林"],
            BLUE: ["希腊 圣托里尼蓝顶", "马尔代夫 碧蓝海岛", "冰岛 蓝冰洞", "威尼斯 蓝色水城"],
            CYAN: ["克罗地亚 杜布罗夫尼克", "日本 北海道青池", "加拿大 路易斯湖"],
            PURPLE: ["法国 薰衣草田", "北欧 紫色极光", "意大利 五渔村黄昏"],
            WHITE: ["瑞士 雪山之巅", "日本 富士山雪景", "南极 纯白冰川"],
            BLACK: ["美国 纽约曼哈顿深夜", "冰岛 黑沙滩", "沙漠 暗夜星空"],
            PINK: ["日本 京都樱花季", "荷兰 粉色郁金香", "玻利维亚 粉红盐湖"]
        };

        const colorFamilies = [
            { name: "RED", hex: "#FF4D4D" }, { name: "ORANGE", hex: "#FF9933" },
            { name: "YELLOW", hex: "#FFFF4D" }, { name: "GREEN", hex: "#4DFF4D" },
            { name: "BLUE", hex: "#4D4DFF" }, { name: "CYAN", hex: "#4DFFFF" },
            { name: "PURPLE", hex: "#CC33FF" }, { name: "PINK", hex: "#FFCCE6" },
            { name: "WHITE", hex: "#FFFFFF" }, { name: "BLACK", hex: "#333333" }
        ];

        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        // 拖拽与上传逻辑
        const setupPage = document.getElementById('setup-page');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            window.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
            setupPage.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });
        setupPage.addEventListener('dragenter', () => pages.setupContainer.classList.add('drag-over'));
        setupPage.addEventListener('dragleave', () => pages.setupContainer.classList.remove('drag-over'));
        setupPage.addEventListener('drop', (e) => {
            pages.setupContainer.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            [...files].forEach(file => {
                if (file.type.startsWith('image/')) {
                    const id = Date.now() + Math.random();
                    addNewProduct(id);
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById(`img-${id}`).src = ev.target.result;
                        document.getElementById(`img-${id}`).style.display = 'block';
                        document.getElementById(`label-${id}`).style.display = 'none';
                        const p = products.find(x => x.id === id);
                        p.base64 = ev.target.result.split(',')[1];
                        extractPrimaryColor(ev.target.result, (hex) => manualSetColor(id, getColorFamily(hex)));
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function addNewProduct(customId = null) {
            const id = customId || Date.now();
            const card = document.createElement('div');
            card.className = 'product-card';
            card.id = `card-${id}`;
            let colorsHtml = colorFamilies.map(f => `<div class="color-option" id="color-${id}-${f.name}" style="background:${f.hex}" onclick="manualSetColor(${id}, '${f.name}')"></div>`).join('');
            card.innerHTML = `<span class="remove-btn" onclick="removeProduct(${id})">✕</span><div class="preview-circle" onclick="activeFileTarget=${id};document.getElementById('hidden-file').onchange=(e)=>handleFiles(e.target.files);document.getElementById('hidden-file').click();"><img id="img-${id}" style="display:none"><span id="label-${id}" style="font-size:0.5rem;opacity:0.2;">上传形象</span></div><input type="text" class="card-input" id="name-${id}" placeholder="产品名称" onchange="products.find(x=>x.id===${id}).name=this.value"><div class="color-picker">${colorsHtml}</div>`;
            document.getElementById('product-list').insertBefore(card, document.querySelector('.add-card'));
            products.push({ id, name: "", base64: "", family: "WHITE" });
        }

        function manualSetColor(id, family) {
            const p = products.find(x => x.id === id);
            p.family = family;
            colorFamilies.forEach(f => {
                const el = document.getElementById(`color-${id}-${f.name}`);
                if (el) el.classList.toggle('active', f.name === family);
            });
        }

        function extractPrimaryColor(src, cb) {
            const i = new Image(); i.src = src;
            i.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 1; c.height = 1; ctx.drawImage(i, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                cb("#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1));
            };
        }

        function getColorFamily(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
            let h; if (d === 0) h = 0; else if (max === r) h = (g - b) / d + (g < b ? 6 : 0); else if (max === g) h = (b - r) / d + 2; else if (max === b) h = (r - g) / d + 4;
            h /= 6;
            if (max < 50) return "BLACK"; if (min > 200) return "WHITE";
            if (h < 0.05 || h > 0.95) return (r > 200 && g > 150 && b > 150) ? "PINK" : "RED";
            if (h < 0.15) return "ORANGE"; if (h < 0.25) return "YELLOW";
            if (h < 0.45) return "GREEN"; if (h < 0.55) return "CYAN";
            if (h < 0.75) return "BLUE"; return "PURPLE";
        }

        function removeProduct(id) { products = products.filter(x => x.id !== id); document.getElementById(`card-${id}`).remove(); }
        function saveAllSetup() { if (products.length && products.every(p => p.base64 && p.name)) showPage('home'); else alert("信息不完整"); }

        async function goToScan() {
            showPage('scan'); isAnalyzing = false;
            try { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); detectGestureLoop(); } catch (e) { alert("摄像头不可用"); }
        }

        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0); const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Is the person giving a thumbs-up? If YES, identify dominant thematic color category: RED, GREEN, BLUE, YELLOW, ORANGE, PURPLE, WHITE, BLACK, PINK, CYAN. Respond: YES, CATEGORY." }, 
                            { inlineData: { mimeType: "image/jpeg", data: base64 } }
                        ] }]
                    })
                });
                const res = await response.json(); const txt = res.candidates?.[0]?.content?.parts?.[0]?.text?.toUpperCase();
                if (txt?.startsWith("YES")) {
                    isAnalyzing = true;
                    document.getElementById('flash').style.opacity = "1";
                    setTimeout(() => {
                        document.getElementById('flash').style.opacity = "0";
                        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                        const family = txt.split(",")[1]?.trim() || "WHITE";
                        runAnalysis(base64, family);
                    }, 300);
                } else setTimeout(detectGestureLoop, 1500);
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function runAnalysis(userBase64, family) {
            let matches = products.filter(p => p.family === family);
            let bestMatch = matches.length > 0 ? matches[0] : products[0];
            const destinations = destinationMap[family] || destinationMap["WHITE"];
            const dest = destinations[Math.floor(Math.random() * destinations.length)];

            document.getElementById('dest-name').innerText = dest;
            document.getElementById('drink-name').innerText = bestMatch.name;
            document.getElementById('reason').innerText = `此刻的你，最适合带着这瓶${bestMatch.name}，出现在${dest}。那里的色泽正与你当下的气场产生着奇妙的共鸣。`;
            
            showPage('result');
            generateArt(userBase64, bestMatch, dest);
        }

        async function generateArt(userBase64, matchDrink, dest) {
            const artPrompt = `High-end Cinematic Travel Photography. 
            SUBJECT: A traveler (replicate person from Image 1 with 100% similarity) holding the beverage bottle from Image 2. 
            SCENE: Beautiful landscape of ${dest}. 
            VIBE: Dreamy vacation, stunning lighting, professional color grading. The bottle must be held naturally by the traveler.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: userBase64 } }, { inlineData: { mimeType: "image/jpeg", data: matchDrink.base64 } } ] }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                const res = await response.json(); const img = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (img) {
                    const artImg = document.getElementById('art-img');
                    artImg.src = `data:image/png;base64,${img}`;
                    artImg.onload = () => { artImg.style.display = "block"; document.getElementById('art-loading').style.display = "none"; };
                }
            } catch (e) { console.log(e); }
        }

        function reset() {
            isAnalyzing = false;
            const artImg = document.getElementById('art-img');
            artImg.style.display = 'none'; artImg.src = "";
            document.getElementById('art-loading').style.display = 'block';
            showPage('home');
        }

        addNewProduct();
    </script>
</body>
</html>
