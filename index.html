<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 色感智选版</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; padding: 0; font-family: var(--font-main);
            background-color: var(--primary-dark); color: #fff;
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none; z-index: 1000;
        }

        .noise-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        #cursor-follower {
            width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; justify-content: center;
            align-items: center; padding: 40px; z-index: 10;
        }
        .page.active { display: flex; animation: fadeIn 1.2s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: #000; }
        .aura-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px); opacity: 0.2; transition: all 4s ease;
        }

        /* 多产品配置页 */
        .setup-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 2px;
            width: 100%; max-width: 900px;
            max-height: 85vh; overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .product-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; position: relative;
        }

        .product-card .remove-btn {
            position: absolute; top: 10px; right: 10px;
            cursor: pointer; opacity: 0.3; font-size: 0.8rem;
        }

        .preview-circle {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-radius: 50%;
        }
        .preview-circle img { width: 100%; height: 100%; object-fit: contain; }

        .card-input {
            width: 100%; background: none; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-align: center; font-size: 0.8rem;
            padding: 5px 0; outline: none;
        }

        .add-card {
            border: 1px dashed rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; min-height: 180px;
        }

        /* 识别页 */
        .scan-viewport {
            width: 100%; max-width: 480px; aspect-ratio: 3/4;
            background: #000; position: relative; overflow: hidden;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; }

        /* 结果页 */
        .result-container {
            display: grid; grid-template-columns: 1.2fr 0.8fr;
            gap: 80px; max-width: 1200px; width: 100%; align-items: center;
        }
        .art-box { width: 100%; aspect-ratio: 3/4; background: #0d0d0f; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        #art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px 40px; font-size: 0.65rem;
            letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: 0.5s;
        }
        .btn:hover { background: #fff; color: #000; }

        #fortune-title { font-family: var(--font-serif); font-size: 3rem; font-weight: 200; margin: 0; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 20px 0; opacity: 0.8; }
        #reason { font-size: 0.85rem; line-height: 2.4; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>

    <!-- 1. 配置页 -->
    <div id="setup-page" class="page active">
        <div class="setup-container">
            <h2 style="font-family:var(--font-serif); letter-spacing:10px; margin-bottom:40px; text-align:center;">色感智选配置</h2>
            <div class="product-list" id="product-list">
                <!-- 动态生成产品卡片 -->
                <div class="add-card" onclick="addNewProduct()">
                    <span style="font-size:2rem; margin-bottom:10px;">+</span>
                    <span style="font-size:0.6rem; letter-spacing:2px; opacity:0.5;">添加饮料产品</span>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="btn" onclick="saveAllSetup()">保存并进入首页</button>
            </div>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <h1 style="font-family:var(--font-serif); font-size:5rem; letter-spacing:2rem; padding-left:2rem; font-weight:200;">灵犀感知</h1>
        <p style="letter-spacing:12px; opacity:0.4; margin-bottom:60px;">色感共鸣 · 因缘而遇</p>
        <button class="btn" onclick="goToScan()">开启感悟</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:0.3s;"></div>
        </div>
        <p id="progress-val" style="margin-top:40px; font-family:var(--font-serif); letter-spacing:8px;">观色定心...</p>
        <p style="font-size:0.6rem; letter-spacing:3px; opacity:0.3;">系统正在感知您的衣着色调与气场</p>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div id="art-loading" style="text-align:center; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
                    <div class="manifesting-circle" style="width:40px; height:40px; border:1px solid rgba(255,255,255,0.1); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;"></div>
                </div>
                <img id="art-img">
            </div>
            <div class="info-box">
                <span style="font-size:0.6rem; letter-spacing:5px; opacity:0.3;">COLOR RESONANCE // 色感共鸣</span>
                <h2 id="fortune-title">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="margin-top:40px;">重寻色迹</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" accept="image/*">
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk";
        const pages = {
            setup: document.getElementById('setup-page'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        
        let products = []; // { id, name, base64, color }
        let isAnalyzing = false;
        let activeFileTarget = null;

        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        // 产品卡片管理
        function addNewProduct() {
            const id = Date.now();
            const card = document.createElement('div');
            card.className = 'product-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <span class="remove-btn" onclick="removeProduct(${id})">✕</span>
                <div class="preview-circle" onclick="triggerUpload(${id})">
                    <img id="img-${id}" src="" style="display:none">
                    <span id="label-${id}" style="font-size:0.5rem; opacity:0.3;">上传图</span>
                </div>
                <input type="text" class="card-input" id="name-${id}" placeholder="饮料名称" onchange="updateProductName(${id}, this.value)">
                <div id="color-dot-${id}" style="width:10px; height:10px; border-radius:50%; margin:10px auto; display:none;"></div>
            `;
            const list = document.getElementById('product-list');
            list.insertBefore(card, list.lastElementChild);
            products.push({ id, name: "", base64: "", color: "" });
        }

        function triggerUpload(id) {
            activeFileTarget = id;
            document.getElementById('hidden-file').click();
        }

        document.getElementById('hidden-file').onchange = function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result.split(',')[1];
                    const img = document.getElementById(`img-${activeFileTarget}`);
                    img.src = event.target.result;
                    img.style.display = 'block';
                    document.getElementById(`label-${activeFileTarget}`).style.display = 'none';
                    
                    const p = products.find(x => x.id === activeFileTarget);
                    p.base64 = base64;
                    
                    // 自动提取颜色
                    extractPrimaryColor(event.target.result, (hex) => {
                        p.color = hex;
                        const dot = document.getElementById(`color-dot-${activeFileTarget}`);
                        dot.style.background = hex;
                        dot.style.display = 'block';
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };

        function extractPrimaryColor(src, callback) {
            const tempImg = new Image();
            tempImg.src = src;
            tempImg.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                c.width = 1; c.height = 1;
                ctx.drawImage(tempImg, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                callback(hex);
            };
        }

        function updateProductName(id, val) { products.find(x => x.id === id).name = val; }
        function removeProduct(id) {
            products = products.filter(x => x.id !== id);
            document.getElementById(`card-${id}`).remove();
        }

        function saveAllSetup() {
            if (products.length === 0 || products.some(p => !p.base64 || !p.name)) {
                alert("请至少添加一个完整的产品信息");
                return;
            }
            showPage('home');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) { alert("识别需要摄像头权限"); }
        }

        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                // 识别大拇指 + 识别衣服颜色
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person giving a thumbs-up? If YES, also identify the dominant color of their clothes in HEX format. Respond only as: YES, #HEXCODE or NO." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                
                if (text && text.startsWith("YES")) {
                    isAnalyzing = true;
                    const detectedColor = text.split(",")[1]?.trim() || "#FFFFFF";
                    triggerSuccess(base64, detectedColor);
                } else {
                    setTimeout(detectGestureLoop, 1500);
                }
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function triggerSuccess(userBase64, clothingColor) {
            document.getElementById('flash').style.opacity = "1";
            setTimeout(() => {
                document.getElementById('flash').style.opacity = "0";
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                matchAndGenerate(userBase64, clothingColor);
            }, 300);
        }

        // 匹配算法
        function matchAndGenerate(userBase64, clothingColor) {
            let bestMatch = products[0];
            let minDiff = Infinity;

            products.forEach(p => {
                const diff = colorDistance(clothingColor, p.color);
                if (diff < minDiff) {
                    minDiff = diff;
                    bestMatch = p;
                }
            });

            const data = {
                "fortuneTitle": "色感共鸣",
                "drinkName": bestMatch.name,
                "reason": `观君今日衣着，其色正如这瓶${bestMatch.name}般清澈、灵动。此色乃缘分之牵引，恰似此番感知之契机。`
            };

            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            document.getElementById('drink-name').innerText = data.drinkName;
            document.getElementById('drink-name').style.color = bestMatch.color;
            document.getElementById('reason').innerText = data.reason;
            bgGlow.style.background = `radial-gradient(circle, ${bestMatch.color}33 0%, transparent 70%)`;
            
            showPage('result');
            generateArt(userBase64, bestMatch);
        }

        // 颜色欧氏距离
        function colorDistance(hex1, hex2) {
            const r1 = parseInt(hex1.slice(1,3), 16), g1 = parseInt(hex1.slice(3,5), 16), b1 = parseInt(hex1.slice(5,7), 16);
            const r2 = parseInt(hex2.slice(1,3), 16), g2 = parseInt(hex2.slice(3,5), 16), b2 = parseInt(hex2.slice(5,7), 16);
            return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
        }

        async function generateArt(userBase64, matchDrink) {
            const artPrompt = `High-end Traditional Chinese Gongbi style painting on silk. 
            CHARACTER: Replicate the person in Image 1 with 100% similarity, but dressed as a Zen scholar in ethereal robes of color ${matchDrink.color}. 
            PRODUCT: The person is elegantly holding the EXACT beverage bottle from Image 2. Replicate its shape and label faithfully. 
            VIBE: One cohesive, poetic masterpiece where the character and the drink are perfectly integrated.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ 
                                { text: artPrompt }, 
                                { inlineData: { mimeType: "image/jpeg", data: userBase64 } },
                                { inlineData: { mimeType: "image/jpeg", data: matchDrink.base64 } }
                            ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (genBase64) {
                    const img = document.getElementById('art-img');
                    img.src = `data:image/png;base64,${genBase64}`;
                    img.onload = () => {
                        img.style.display = "block";
                        document.getElementById('art-loading').style.display = "none";
                    };
                }
            } catch (e) { console.log("Fail"); }
        }

        function reset() {
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('art-loading').style.display = 'block';
            showPage('home');
        }

        // 初始化添加一个空卡片
        addNewProduct();
    </script>
</body>
</html>
