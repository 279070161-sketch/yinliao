<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 环球寻色画报</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&family=Outfit:wght@100;300;400&display=swap');

        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: 'Outfit', sans-serif;
            --font-serif: 'Noto Serif SC', serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; padding: 0; font-family: var(--font-main);
            background-color: var(--primary-dark); color: #fff;
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }

        /* 顶级画廊边框 */
        body::before {
            content: ""; position: fixed; inset: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none; z-index: 1000;
        }

        .noise-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        /* 磁吸光标 */
        #cursor-follower {
            width: 35px; height: 35px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
            transition: transform 0.2s cubic-bezier(0.1, 0.7, 0.1, 1);
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; justify-content: center;
            align-items: center; padding: 60px; z-index: 10;
        }
        .page.active { display: flex; animation: pageFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: #000; }
        .aura-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; height: 90vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(140px); opacity: 0.3; transition: 3s ease-in-out;
        }

        /* 首页设置图标 */
        .settings-btn {
            position: absolute; top: 50px; right: 50px;
            width: 22px; height: 22px; cursor: pointer; opacity: 0.2;
            transition: 0.4s; z-index: 1001;
        }
        .settings-btn:hover { opacity: 1; transform: rotate(45deg); }

        /* 配置页卡片设计 */
        .setup-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 50px; border-radius: 2px;
            width: 100%; max-width: 1000px;
            max-height: 80vh; overflow-y: auto;
            backdrop-filter: blur(30px);
            transition: 0.4s;
        }
        .setup-container.drag-over { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }

        .product-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; margin-bottom: 40px;
        }
        .product-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; position: relative; text-align: center; border-radius: 4px;
        }
        .remove-btn { position: absolute; top: 12px; right: 12px; cursor: pointer; opacity: 0.2; font-size: 0.7rem; }
        .remove-btn:hover { opacity: 1; }

        .preview-circle {
            width: 90px; height: 90px; background: rgba(255,255,255,0.04);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        .preview-circle img { width: 100%; height: 100%; object-fit: contain; }

        .card-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-align: center; font-size: 0.8rem; padding: 8px 0; outline: none; margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .color-picker { display: flex; justify-content: center; gap: 8px; }
        .color-option { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .color-option.active { transform: scale(1.5); border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .add-card { border: 1px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 200px; opacity: 0.4; transition: 0.3s; }
        .add-card:hover { opacity: 1; border-color: rgba(255,255,255,0.3); }

        /* 首页设计 */
        #home-page h1 { font-family: var(--font-serif); font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 2rem; font-weight: 200; margin-bottom: 20px; }
        #home-page p { letter-spacing: 12px; opacity: 0.4; font-size: 0.7rem; margin-bottom: 80px; text-transform: uppercase; }

        /* 结果页：全貌展示与产品强化排版 */
        .result-container {
            display: grid; grid-template-columns: 1.4fr 0.6fr;
            gap: 60px; max-width: 1400px; width: 100%; align-items: center;
        }

        .poster-box {
            width: 100%; aspect-ratio: 16/10; background: #000;
            position: relative; overflow: hidden; box-shadow: 0 50px 150px rgba(0,0,0,0.8);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }

        /* 底部毛玻璃背景：确保全貌展示时背景不单调 */
        .poster-bg-blur {
            position: absolute; inset: -20px;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.4); opacity: 0.6; z-index: 1;
        }

        #art-img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            display: none; z-index: 2; position: relative;
            animation: imgReveal 3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes imgReveal { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* 强化版产品浮层 */
        .product-badge {
            position: absolute; bottom: 40px; right: 40px;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(25px);
            padding: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(30px); opacity: 0; z-index: 10;
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1) 2.5s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .product-badge.show { transform: translateY(0); opacity: 1; }
        .product-badge img { 
            width: 160px; height: 160px; object-fit: contain; 
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .product-badge span { font-size: 0.75rem; letter-spacing: 4px; opacity: 0.7; font-weight: 300; text-transform: uppercase; }

        /* 侧边信息栏 */
        .info-panel { padding-right: 40px; }
        .info-tag { font-size: 0.6rem; letter-spacing: 5px; opacity: 0.3; display: block; margin-bottom: 25px; text-transform: uppercase; }
        #dest-title { font-family: var(--font-serif); font-size: 2.8rem; font-weight: 200; margin: 0; line-height: 1.3; }
        #rec-reason { font-size: 0.9rem; line-height: 2.4; opacity: 0.4; margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 35px; text-align: justify; }

        .btn {
            background: none; border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 18px 45px; font-size: 0.65rem;
            letter-spacing: 5px; text-transform: uppercase; cursor: pointer; transition: 0.5s;
        }
        .btn:hover { background: #fff; color: #000; transform: translateY(-3px); }

        /* 识别视窗 */
        .scan-viewport {
            width: 320px; height: 320px; border-radius: 50%;
            background: #111; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.7; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>

    <!-- 1. 配置页 -->
    <div id="setup-page" class="page active">
        <div class="setup-container">
            <h2 style="font-family:var(--font-serif); letter-spacing:10px; margin-bottom:45px; text-align:center; font-weight:200;">寻色漫旅 · 产品库</h2>
            <div class="product-list" id="product-list">
                <div class="add-card" onclick="addNewProduct()">
                    <span style="font-size:1.5rem; margin-bottom:10px;">+</span>
                    <span style="font-size:0.5rem; letter-spacing:2px;">添加产品</span>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="btn" onclick="saveAllSetup()">确认配置</button>
            </div>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <svg class="settings-btn" onclick="showPage('setup')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        <h1>灵犀感知</h1>
        <p>TRAVEL PICTORIAL // 环球寻色之旅</p>
        <button class="btn" onclick="goToScan()">开启浪漫感应</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:0.3s;"></div>
        </div>
        <p id="progress-val" style="margin-top:45px; letter-spacing:8px; font-size:0.8rem; opacity:0.6;">正在捕捉您的气质色调...</p>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="poster-box">
                <div id="art-bg-blur" class="poster-bg-blur"></div>
                <div id="art-loading" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index:4;">
                    <div style="width:25px; height:25px; border:1px solid #111; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;"></div>
                </div>
                <img id="art-img">
                <div class="product-badge" id="product-badge">
                    <img id="res-drink-img" src="">
                    <span id="res-drink-name">产品名称</span>
                </div>
            </div>

            <div class="info-panel">
                <span class="info-tag">Cinematic Vibe // 情绪现场</span>
                <h2 id="dest-title">载入中...</h2>
                <p id="rec-reason">---</p>
                <div style="margin-top:60px;">
                    <button class="btn" onclick="reset()">重新启程</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" accept="image/*" multiple>
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk";
        const pages = {
            setup: document.getElementById('setup-page'),
            setupContainer: document.querySelector('.setup-container'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        
        let products = [];
        let isAnalyzing = false;
        let activeFileTarget = null;

        const destinationMap = {
            RED: ["故宫 · 红墙", "罗马 · 斗兽场", "马拉喀什 · 红城", "印度 · 泰姬陵"],
            ORANGE: ["澳大利亚 · 乌鲁鲁", "美国 · 大峡谷", "卡帕多奇亚 · 热气球"],
            YELLOW: ["埃及 · 金字塔", "缅甸 · 蒲甘佛塔", "普罗旺斯 · 向日葵"],
            GREEN: ["新西兰 · 皇后镇", "瑞士 · 阿尔卑斯", "桂林 · 山水", "冰岛 · 极光森林"],
            BLUE: ["圣托里尼 · 蓝顶", "马尔代夫 · 碧蓝海岛", "冰岛 · 蓝冰洞", "威尼斯 · 水城"],
            CYAN: ["克罗地亚 · 亚得里亚海", "北海道 · 青池", "路易斯湖 · 冰川"],
            PURPLE: ["普罗旺斯 · 薰衣草", "北欧 · 紫色极光", "五渔村 · 黄昏紫调"],
            WHITE: ["瑞士 · 少女峰", "富士山 · 雪景", "南极 · 纯白冰川"],
            BLACK: ["纽约 · 曼哈顿", "冰岛 · 黑沙滩", "撒哈拉 · 暗夜星空"],
            PINK: ["京都 · 樱花季", "荷兰 · 郁金香", "玻利维亚 · 粉红盐湖"]
        };

        const colorFamilies = [
            { name: "RED", hex: "#FF4D4D" }, { name: "ORANGE", hex: "#FF9933" },
            { name: "YELLOW", hex: "#FFFF4D" }, { name: "GREEN", hex: "#4DFF4D" },
            { name: "BLUE", hex: "#4D4DFF" }, { name: "CYAN", hex: "#4DFFFF" },
            { name: "PURPLE", hex: "#CC33FF" }, { name: "PINK", hex: "#FFCCE6" },
            { name: "WHITE", hex: "#FFFFFF" }, { name: "BLACK", hex: "#333333" }
        ];

        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        // 全局拖拽支持
        const setupPage = document.getElementById('setup-page');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            window.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
            setupPage.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });
        setupPage.addEventListener('dragenter', () => pages.setupContainer.classList.add('drag-over'));
        setupPage.addEventListener('dragleave', () => pages.setupContainer.classList.remove('drag-over'));
        setupPage.addEventListener('drop', (e) => {
            pages.setupContainer.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files, replaceTargetId = null) {
            [...files].forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    let fullName = file.name.split('.')[0];
                    let detectedFamily = null;
                    let cleanName = fullName;

                    const prefixMap = [
                        { key: "红色", family: "RED" }, { key: "红", family: "RED" },
                        { key: "绿色", family: "GREEN" }, { key: "绿", family: "GREEN" },
                        { key: "蓝色", family: "BLUE" }, { key: "蓝", family: "BLUE" },
                        { key: "黄色", family: "YELLOW" }, { key: "黄", family: "YELLOW" },
                        { key: "橙色", family: "ORANGE" }, { key: "橙", family: "ORANGE" },
                        { key: "青色", family: "CYAN" }, { key: "青", family: "CYAN" },
                        { key: "紫色", family: "PURPLE" }, { key: "紫", family: "PURPLE" },
                        { key: "粉色", family: "PINK" }, { key: "粉", family: "PINK" },
                        { key: "白色", family: "WHITE" }, { key: "白", family: "WHITE" },
                        { key: "黑色", family: "BLACK" }, { key: "黑", family: "BLACK" }
                    ];

                    for (let item of prefixMap) {
                        if (fullName.startsWith(item.key)) {
                            detectedFamily = item.family;
                            cleanName = fullName.substring(item.key.length);
                            break;
                        }
                    }

                    if (replaceTargetId && files.length === 1) {
                        // 更新现有卡片名
                        const nameInput = document.getElementById(`name-${replaceTargetId}`);
                        if (nameInput && !nameInput.value) { // 仅在名称为空时自动填充
                            nameInput.value = cleanName;
                            const p = products.find(x => x.id === replaceTargetId);
                            if (p) p.name = cleanName;
                        }
                        readFile(file, replaceTargetId, detectedFamily);
                        return;
                    }

                    const id = Date.now() + Math.random() + index;
                    addNewProduct(id);
                    document.getElementById(`name-${id}`).value = cleanName;
                    const p = products.find(x => x.id === id);
                    p.name = cleanName;
                    readFile(file, id, detectedFamily);
                }
            });
        }

        function readFile(file, id, forceFamily = null) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.getElementById(`img-${id}`);
                img.src = ev.target.result; img.style.display = 'block';
                document.getElementById(`label-${id}`).style.display = 'none';
                const p = products.find(x => x.id === id);
                p.base64 = ev.target.result.split(',')[1];
                
                if (forceFamily) {
                    manualSetColor(id, forceFamily);
                } else {
                    extractPrimaryColor(ev.target.result, (hex) => manualSetColor(id, getColorFamily(hex)));
                }
            };
            reader.readAsDataURL(file);
        }

        function addNewProduct(customId = null) {
            const id = customId || Date.now();
            const card = document.createElement('div');
            card.className = 'product-card'; card.id = `card-${id}`;
            let colorsHtml = colorFamilies.map(f => `<div class="color-option" id="color-${id}-${f.name}" style="background:${f.hex}" onclick="manualSetColor(${id}, '${f.name}')"></div>`).join('');
            card.innerHTML = `<span class="remove-btn" onclick="removeProduct(${id})">✕</span><div class="preview-circle" onclick="activeFileTarget=${id};document.getElementById('hidden-file').onchange=(e)=>handleFiles(e.target.files, ${id});document.getElementById('hidden-file').click();"><img id="img-${id}" style="display:none"><span id="label-${id}" style="font-size:0.5rem;opacity:0.2;">上传形象</span></div><input type="text" class="card-input" id="name-${id}" placeholder="产品名称" onchange="products.find(x=>x.id===${id}).name=this.value"><div class="color-picker">${colorsHtml}</div>`;
            document.getElementById('product-list').insertBefore(card, document.querySelector('.add-card'));
            products.push({ id, name: "", base64: "", family: "WHITE" });
        }

        function manualSetColor(id, family) {
            const p = products.find(x => x.id === id); p.family = family;
            colorFamilies.forEach(f => {
                const el = document.getElementById(`color-${id}-${f.name}`);
                if (el) el.classList.toggle('active', f.name === family);
            });
        }

        function extractPrimaryColor(src, cb) {
            const i = new Image(); i.src = src;
            i.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 1; c.height = 1; ctx.drawImage(i, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                cb("#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1));
            };
        }

        function getColorFamily(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
            let h; if (d === 0) h = 0; else if (max === r) h = (g - b) / d + (g < b ? 6 : 0); else if (max === g) h = (b - r) / d + 2; else if (max === b) h = (r - g) / d + 4;
            h /= 6;
            if (max < 50) return "BLACK"; if (min > 200) return "WHITE";
            if (h < 0.05 || h > 0.95) return (r > 200 && g > 150 && b > 150) ? "PINK" : "RED";
            if (h < 0.15) return "ORANGE"; if (h < 0.25) return "YELLOW";
            if (h < 0.45) return "GREEN"; if (h < 0.55) return "CYAN";
            if (h < 0.75) return "BLUE"; return "PURPLE";
        }

        function removeProduct(id) { products = products.filter(x => x.id !== id); document.getElementById(`card-${id}`).remove(); }
        function saveAllSetup() { if (products.length && products.every(p => p.base64 && p.name)) showPage('home'); else alert("请确保产品信息完整"); }

        async function goToScan() {
            showPage('scan'); isAnalyzing = false;
            try { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); detectGestureLoop(); } catch (e) { alert("摄像头权限受限"); }
        }

        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0); const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Is the person giving a thumbs-up? If YES, identify dominant thematic color category: RED, GREEN, BLUE, YELLOW, ORANGE, PURPLE, WHITE, BLACK, PINK, CYAN. Respond: YES, CATEGORY." }, 
                        { inlineData: { mimeType: "image/jpeg", data: base64 } }
                    ] }] })
                });
                const res = await response.json(); const txt = res.candidates?.[0]?.content?.parts?.[0]?.text?.toUpperCase();
                if (txt?.startsWith("YES")) {
                    isAnalyzing = true;
                    document.getElementById('flash').style.opacity = "1";
                    setTimeout(() => {
                        document.getElementById('flash').style.opacity = "0";
                        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                        const family = txt.split(",")[1]?.trim() || "WHITE";
                        runAnalysis(base64, family);
                    }, 300);
                } else setTimeout(detectGestureLoop, 1500);
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function runAnalysis(userBase64, family) {
            let matches = products.filter(p => p.family === family);
            let bestMatch = matches.length > 0 ? matches[0] : products[0];
            const destinations = destinationMap[family] || destinationMap["WHITE"];
            const dest = destinations[Math.floor(Math.random() * destinations.length)];

            document.getElementById('dest-title').innerText = dest;
            document.getElementById('mag-city').innerText = dest;
            document.getElementById('res-drink-name').innerText = bestMatch.name;
            document.getElementById('res-drink-img').src = "data:image/png;base64," + bestMatch.base64;
            
            showPage('result');
            generateArt(userBase64, bestMatch, dest, family);
        }

        async function generateArt(userBase64, matchDrink, dest, family) {
            const artPrompt = `Cinematic Moody Portrait Photography. 
            SUBJECT: A traveler (replicate person from Image 1 with 100% similarity). 
            SCENE: Atmospheric landscape of ${dest}. 
            STYLE: Candid storytelling, natural cinematic light, dreamy bokeh, melancholic yet beautiful, vintage film aesthetic, deep emotions. 
            No text, no watermarks, pure visual storytelling masterpiece.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: userBase64 } } ] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } })
                });
                const res = await response.json(); const img = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (img) {
                    const artImg = document.getElementById('art-img');
                    const artBg = document.getElementById('art-bg-blur');
                    const dataUrl = `data:image/png;base64,${img}`;
                    artImg.src = dataUrl;
                    artBg.style.backgroundImage = `url(${dataUrl})`;
                    
                    artImg.onload = () => { 
                        artImg.style.display = "block"; document.getElementById('art-loading').style.display = "none";
                        document.getElementById('product-badge').classList.add('show');
                    };
                }
                const reason = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Write a soulful, melancholic and poetic travel diary entry in Chinese (45 words) for someone in ${dest}. Mention that ${matchDrink.name} is the quiet companion for this moment. Focus on atmosphere and feelings.` }] }] })
                }).then(r => r.json()).then(d => d.candidates[0].content.parts[0].text);
                document.getElementById('rec-reason').innerText = reason;
            } catch (e) { console.log(e); }
        }

        function reset() {
            isAnalyzing = false;
            const artImg = document.getElementById('art-img'); artImg.style.display = 'none'; artImg.src = "";
            document.getElementById('art-loading').style.display = 'block';
            document.getElementById('product-badge').classList.remove('show');
            showPage('home');
        }

        addNewProduct();
    </script>
</body>
</html>
