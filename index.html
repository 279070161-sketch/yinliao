<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 品牌定制版</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 画廊式全局边框 */
        body::before {
            content: "";
            position: fixed;
            inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 1000;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 999;
        }

        #cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1), 
                        width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
            transform: translate3d(-50%, -50%, 0);
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 1.2s ease;
            z-index: 10;
        }

        .page.active { display: flex; animation: fadeIn 1.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .aura-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        .aura-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            transition: all 4s ease-in-out;
        }

        /* 配置页样式 */
        .setup-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .input-group input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 15px;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .product-preview-box {
            width: 100%;
            height: 200px;
            border: 1px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            overflow: hidden;
            cursor: pointer;
        }

        .product-preview-box img {
            max-height: 100%;
            object-fit: contain;
        }

        /* 结果页画盒 */
        .art-box {
            width: 100%;
            aspect-ratio: 4/5;
            background: #0d0d0f;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        #art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
            animation: imageReveal 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 商业级产品叠加层 */
        #product-overlay {
            position: absolute;
            right: 15%;
            bottom: 8%;
            width: 35%;
            z-index: 100;
            display: none;
            filter: contrast(1.1) brightness(0.95) drop-shadow(0 15px 35px rgba(0,0,0,0.5));
            animation: bottleFloat 6s ease-in-out infinite;
        }

        #product-overlay img { width: 100%; height: auto; }

        @keyframes bottleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 20px 50px;
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(3.5rem, 12vw, 5.5rem);
            letter-spacing: 2.5rem;
            font-weight: 200;
            margin-bottom: 30px;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-left: 2.5rem; 
        }

        .scan-viewport {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4;
            background: #000;
            overflow: hidden;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: grayscale(1) contrast(0.9) brightness(1.1) blur(2px) sepia(0.2);
            opacity: 0.7;
        }

        .info-box { display: flex; flex-direction: column; justify-content: center; }
        #fortune-title { font-family: var(--font-serif); font-size: 3rem; margin: 0; font-weight: 300; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 25px 0; font-weight: 300; }
        #reason { font-size: 0.9rem; line-height: 2.4; opacity: 0.5; text-align: justify; }

        @keyframes imageReveal {
            from { opacity: 0; filter: blur(30px) brightness(1.5); }
            to { opacity: 1; filter: blur(0) brightness(1); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .manifesting-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .version-tag {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            opacity: 0.3;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-follower"></div>
    <div class="aura-bg"><div class="aura-glow" id="bg-glow"></div></div>
    <div class="version-tag">Product Promo Edition // v 1.6</div>

    <!-- 1. 配置页 (新增) -->
    <div id="setup-page" class="page active">
        <div class="setup-box">
            <h2 style="font-family:var(--font-serif); font-weight:200; letter-spacing:10px; margin-bottom:40px;">品牌感悟配置</h2>
            
            <div class="input-group">
                <label>1. 上传饮料实物图 (透明背景最佳)</label>
                <div class="product-preview-box" onclick="document.getElementById('setup-file').click()">
                    <img id="setup-preview" src="" style="display:none">
                    <span id="setup-placeholder" style="opacity:0.4; font-size:0.7rem; letter-spacing:2px;">点击上传产品照片</span>
                </div>
                <input type="file" id="setup-file" style="display:none" accept="image/*" onchange="handleSetupUpload(this)">
            </div>

            <div class="input-group">
                <label>2. 输入产品名称</label>
                <input type="text" id="setup-name" placeholder="例如：鸭屎香柠檬茶">
            </div>

            <button class="btn" onclick="saveSetup()">保存并进入首页</button>
        </div>
    </div>

    <!-- 2. 首页 -->
    <div id="home-page" class="page">
        <h1>灵犀感知</h1>
        <p style="letter-spacing:15px; opacity:0.5; margin-bottom:60px;">万物气韵 · 映照本心</p>
        <button class="btn" onclick="goToScan()">开启感悟</button>
    </div>

    <!-- 3. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div id="flash" style="position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:100;"></div>
        </div>
        <div class="progress-text" id="progress-val">等待缘起</div>
        <div class="gesture-hint" id="gesture-hint">请面对镜头，举起大拇指<br>感应产品之气，即将开启...</div>
    </div>

    <!-- 4. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div id="art-loading" style="text-align: center; z-index: 10;">
                    <div class="manifesting-circle" style="margin: 0 auto;"></div>
                    <div id="art-loading-text" style="margin-top:15px; font-size:0.6rem; letter-spacing:4px; opacity:0.4;">画卷铺展中...</div>
                </div>
                <img id="art-img" alt="Gongbi Art">
                <div id="product-overlay"><img id="overlay-img" src=""></div>
            </div>
            <div class="info-box">
                <span style="font-size:0.6rem; letter-spacing:5px; opacity:0.4; text-transform:uppercase;">Soul Resonance // 鸣应</span>
                <h2 id="fortune-title">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="align-self: flex-start;">重寻宿命</button>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk"; 
        const pages = {
            setup: document.getElementById('setup-page'),
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const follower = document.getElementById('cursor-follower');
        const bgGlow = document.getElementById('bg-glow');
        const canvas = document.getElementById('capture-canvas');
        const progressVal = document.getElementById('progress-val');
        
        let isAnalyzing = false;
        let setupProductBase64 = "";
        let setupProductName = "";

        // 鼠标跟随
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        // 配置页上传处理
        function handleSetupUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    setupProductBase64 = e.target.result.split(',')[1];
                    document.getElementById('setup-preview').src = e.target.result;
                    document.getElementById('setup-preview').style.display = 'block';
                    document.getElementById('setup-placeholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveSetup() {
            setupProductName = document.getElementById('setup-name').value;
            if (!setupProductBase64 || !setupProductName) {
                alert("请先上传产品图片并输入名称");
                return;
            }
            showPage('home');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            progressVal.innerText = "正在观照...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) { alert("请允许摄像头权限"); }
        }

        // 识别逻辑：现在只识别大拇指
        async function detectGestureLoop() {
            if (isAnalyzing || !pages.scan.classList.contains('active')) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person in the image giving a thumbs-up gesture? Respond ONLY with 'YES' or 'NO'." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();
                if (text && text.includes("YES")) {
                    triggerSuccess(base64);
                } else {
                    setTimeout(detectGestureLoop, 1500);
                }
            } catch (e) { setTimeout(detectGestureLoop, 3000); }
        }

        function triggerSuccess(base64) {
            isAnalyzing = true;
            document.getElementById('flash').style.opacity = "1";
            progressVal.innerText = "灵犀已通";
            setTimeout(() => {
                document.getElementById('flash').style.opacity = "0";
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                runAnalysis(base64);
            }, 300);
        }

        async function runAnalysis(base64) {
            // 使用配置页的数据
            const data = {
                "fortuneTitle": "万象生辉",
                "hexCode": "#E6B800",
                "drinkName": setupProductName,
                "reason": `此物气韵与阁下心境相合。${setupProductName}之香，如林间初雨，最是涤烦。执此瓶，即是观照本心。`
            };

            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            const drink = document.getElementById('drink-name');
            drink.innerText = data.drinkName;
            drink.style.color = data.hexCode;
            document.getElementById('reason').innerText = data.reason;
            bgGlow.style.background = `radial-gradient(circle, ${data.hexCode}33 0%, transparent 70%)`;
            
            document.getElementById('overlay-img').src = `data:image/jpeg;base64,${setupProductBase64}`;
            showPage('result');
            generateArt(base64);
        }

        async function generateArt(userBase64) {
            // AI 负责画人，代码负责贴产品
            const artPrompt = `A masterpiece Traditional Chinese Gongbi style painting. 
            Subject: A person (resembling the features in Image 1) in ethereal ancient robes, sitting in a misty Zen landscape. 
            Pose: The person is elegantly presenting a gift in their right hand, centered towards the lower-right foreground. 
            Style: Fine ink outlines, mineral pigments, weathered silk texture. 
            IMPORTANT: Leave an aesthetic space in the hands for a product. Do not draw a generic cup.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: userBase64 } } ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (genBase64) {
                    const artImg = document.getElementById('art-img');
                    artImg.src = `data:image/png;base64,${genBase64}`;
                    artImg.onload = () => {
                        artImg.style.display = "block";
                        document.getElementById('art-loading').style.display = "none";
                        document.getElementById('product-overlay').style.display = "block";
                    };
                }
            } catch (e) {
                console.log("Art failed");
            }
        }

        function reset() {
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('product-overlay').style.display = 'none';
            document.getElementById('art-loading').style.display = 'block';
            showPage('home');
        }
    </script>
</body>
</html>
