<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 禅意视觉</title>
    <style>
        :root {
            --primary-dark: #08080a;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 0.8s ease;
        }

        .page.active { display: flex; animation: fadeIn 1s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .aura-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        .aura-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            transition: all 3s ease-in-out;
        }

        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            letter-spacing: 1.5rem;
            font-weight: 200;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #home-page p {
            opacity: 0.4;
            letter-spacing: 0.6rem;
            font-size: 0.85rem;
            margin-bottom: 80px;
            text-align: center;
        }

        .scan-viewport {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            background: #000;
            overflow: hidden;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 100px rgba(255,255,255,0.05);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: grayscale(1) contrast(1.2) brightness(0.7);
            opacity: 0.5;
        }

        .ink-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, #000 100%);
            pointer-events: none;
        }

        .scan-progress-box {
            margin-top: 50px;
            text-align: center;
        }

        .progress-text {
            font-family: var(--font-serif);
            font-size: 1rem;
            letter-spacing: 8px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .result-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 80px;
            max-width: 1200px;
            width: 100%;
            align-items: center;
        }

        @media (max-width: 1000px) {
            .result-container { grid-template-columns: 1fr; gap: 40px; height: 95vh; overflow-y: auto; padding-top: 40px; }
            .art-box { order: 1; max-width: 500px; margin: 0 auto; }
            .info-box { order: 2; text-align: center; padding-bottom: 60px; }
            .btn { align-self: center !important; }
        }

        .art-box {
            width: 100%;
            aspect-ratio: 3/4;
            background: #0a0a0c;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.03);
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .art-fallback-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, var(--dynamic-color), transparent);
            opacity: 0.2;
            display: none;
        }

        #art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 2;
            animation: artUnfold 2.5s cubic-bezier(0.2, 0, 0.2, 1);
        }

        @keyframes artUnfold {
            0% { opacity: 0; filter: blur(30px) brightness(1.5); transform: scale(1.05); }
            100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        #fortune-title { font-family: var(--font-serif); font-size: 3rem; margin: 0; font-weight: 300; letter-spacing: 0.5rem; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 25px 0; font-weight: 300; opacity: 0.8; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; display: inline-block; }
        #reason { font-size: 0.9rem; line-height: 2.5; opacity: 0.5; text-align: justify; font-weight: 300; letter-spacing: 0.05rem; }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 18px 45px;
            font-size: 0.75rem;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 40px;
            text-transform: uppercase;
        }

        .btn:hover { background: #fff; color: #000; border-color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        .loading-wrap { display: flex; flex-direction: column; align-items: center; z-index: 10; position: absolute; }
        .loading-ink {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: rotateInk 1.5s linear infinite;
        }
        @keyframes rotateInk { to { transform: rotate(360deg); } }
        #loading-msg { margin-top: 20px; font-size: 0.65rem; letter-spacing: 3px; opacity: 0.5; font-family: var(--font-serif); }

        .label {
            font-size: 0.6rem;
            letter-spacing: 4px;
            opacity: 0.3;
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="aura-bg">
        <div class="aura-glow" id="bg-glow"></div>
    </div>

    <!-- Page 1: Landing -->
    <div id="home-page" class="page active">
        <h1>灵犀感知</h1>
        <p>万物气韵 · 映照本心</p>
        <button class="btn" onclick="startExperience()">开启仪式</button>
    </div>

    <!-- Page 2: Scanning -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div class="ink-overlay"></div>
            <div id="flash" class="flash-overlay"></div>
        </div>
        <div class="scan-progress-box">
            <div class="progress-text" id="status-text">请面对镜头，合十静心</div>
        </div>
    </div>

    <!-- Page 3: Result -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box">
                <div class="art-fallback-bg" id="fallback-bg"></div>
                <div id="art-placeholder" class="loading-wrap">
                    <div class="loading-ink"></div>
                    <div id="loading-msg">正在研墨...</div>
                </div>
                <img id="art-img" alt="Zen Spirit Art">
            </div>
            <div class="info-box">
                <span class="label">Soul Resonance // 鸣应</span>
                <h2 id="fortune-title">...</h2>
                <div id="drink-name">...</div>
                <p id="reason">...</p>
                <button class="btn" onclick="reset()" style="align-self: flex-start;">再续前缘</button>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = ""; 
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('capture-canvas');
        
        let isActive = false;
        let detectionCounter = 0;

        async function startExperience() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('scan-page').classList.add('active');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                isActive = true;
                detectLoop();
            } catch (err) {
                console.error("Camera access denied");
                alert("请允许摄像头访问以继续体验");
            }
        }

        // 优化检测循环：降低请求频率和图片大小
        async function detectLoop() {
            if (!isActive) return;

            const ctx = canvas.getContext('2d');
            canvas.width = 120; // 极小尺寸用于手势检测，提高速度
            canvas.height = 90;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64 = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Is the person's hands joined together (prayer/namaste)? Answer only YES or NO." },
                            { inlineData: { mimeType: "image/jpeg", data: base64 } }
                        ] }]
                    })
                });
                const data = await resp.json();
                const result = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();

                if (result && result.includes("YES")) {
                    triggerAnalysis();
                } else {
                    // 如果没检测到，稍微等待再继续，避免API配额消耗过快
                    setTimeout(detectLoop, 1000);
                }
            } catch (e) {
                setTimeout(detectLoop, 2000);
            }
        }

        async function triggerAnalysis() {
            isActive = false;
            const flash = document.getElementById('flash');
            flash.style.opacity = "0.8";
            setTimeout(() => flash.style.opacity = "0", 300);
            document.getElementById('status-text').innerText = "感应中，请勿移动...";

            // 拍摄一张高质量照片用于后续分析
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const qualityBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // 停止摄像头节省性能
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }

            try {
                const analysisPrompt = `
                    Analyze the user's energy and color.
                    Return JSON in Chinese: {
                        "fortuneTitle": "4-char idiom",
                        "hexCode": "matching color hex",
                        "drinkName": "refined tea/drink",
                        "drinkVisual": "cup style and liquid details",
                        "reason": "poetic match description",
                        "setting": "traditional scene description",
                        "gender": "male or female",
                        "clothing": "brief clothing description"
                    }
                `;
                
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: analysisPrompt }, { inlineData: { mimeType: "image/jpeg", data: qualityBase64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const jsonResp = await resp.json();
                const data = JSON.parse(jsonResp.candidates[0].content.parts[0].text);

                updateUI(data);
                document.getElementById('scan-page').classList.remove('active');
                document.getElementById('result-page').classList.add('active');

                // 异步开始画图
                generateArt(qualityBase64, data);

            } catch (err) {
                console.error(err);
                reset();
            }
        }

        async function generateArt(base64, data) {
            const msg = document.getElementById('loading-msg');
            msg.innerText = "正在取意构图...";
            
            const artPrompt = `
                Fine Gongbi ink painting style. Traditional Chinese art. Aged silk texture.
                Portrait of a ${data.gender} in ancient scholar's robes (${data.hexCode}) based on ${data.clothing}.
                The person is holding or admiring ${data.drinkName} in a ${data.drinkVisual}.
                Background: ${data.setting}. 
                Technique: Fine lines, elegant wash, soft mineral colors. Focus on tranquility and zen atmosphere.
            `;

            // 设置超时兜底逻辑
            const timeoutId = setTimeout(() => {
                if (document.getElementById('art-img').style.display !== 'block') {
                    msg.innerText = "意境深远，图像尚在凝练中...";
                }
            }, 8000);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } } ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                clearTimeout(timeoutId);
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (genBase64) {
                    const img = document.getElementById('art-img');
                    img.src = `data:image/png;base64,${genBase64}`;
                    img.onload = () => {
                        img.style.display = "block";
                        document.getElementById('art-placeholder').style.display = 'none';
                    };
                } else {
                    throw new Error("No image generated");
                }
            } catch (e) {
                msg.innerText = "丹青难落，已感其意";
                document.getElementById('fallback-bg').style.display = 'block';
            }
        }

        function updateUI(data) {
            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            const dn = document.getElementById('drink-name');
            dn.innerText = data.drinkName;
            dn.style.color = data.hexCode;
            document.getElementById('reason').innerText = data.reason;
            document.getElementById('bg-glow').style.background = `radial-gradient(circle, ${data.hexCode}44 0%, transparent 70%)`;
            document.documentElement.style.setProperty('--dynamic-color', `${data.hexCode}66`);
            document.getElementById('fallback-bg').style.background = `radial-gradient(circle at 50% 50%, ${data.hexCode}22, transparent)`;
        }

        function reset() {
            document.getElementById('result-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('art-placeholder').style.display = 'flex';
            document.getElementById('loading-msg').innerText = "正在研墨...";
            document.getElementById('fallback-bg').style.display = 'none';
            document.getElementById('status-text').innerText = "请面对镜头，合十静心";
        }
    </script>
</body>
</html>
