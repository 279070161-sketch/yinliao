<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 禅意视觉</title>
    <style>
        :root {
            --primary-dark: #08080a;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 增加全局纸张纹理 */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
            pointer-events: none;
            z-index: 999;
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 1.2s ease;
        }

        .page.active { display: flex; animation: fadeIn 1.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .aura-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        .aura-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            transition: all 4s ease-in-out;
        }

        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 10vw, 4.5rem);
            letter-spacing: 2rem;
            font-weight: 200;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        #home-page p {
            opacity: 0.4;
            letter-spacing: 0.8rem;
            font-size: 0.9rem;
            margin-bottom: 60px;
            text-align: center;
            z-index: 10;
            position: relative;
            font-weight: 200;
        }

        /* 首页装饰元素 */
        .home-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .enso-circle {
            width: 450px;
            height: 450px;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 50%;
            position: absolute;
            animation: rotateEnso 20s linear infinite;
        }

        .enso-circle::before {
            content: "";
            position: absolute;
            top: -2px;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff;
            opacity: 0.3;
        }

        @keyframes rotateEnso {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .side-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 0.6rem;
            letter-spacing: 8px;
            opacity: 0.15;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .side-text.left { left: 40px; }
        .side-text.right { right: 40px; transform: translateY(-50%) rotate(90deg); }

        .ver-tag {
            position: absolute;
            bottom: 40px;
            right: 45px;
            font-size: 0.55rem;
            opacity: 0.1;
            letter-spacing: 3px;
            writing-mode: vertical-rl;
        }

        .scan-viewport {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4;
            background: #000;
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 0 80px rgba(255,255,255,0.03);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: grayscale(1) contrast(0.9) brightness(1.1) blur(2px) sepia(0.2);
            opacity: 0.7;
            animation: inkBreathing 6s ease-in-out infinite;
        }

        @keyframes inkBreathing {
            0%, 100% { filter: grayscale(1) contrast(0.8) blur(3px) sepia(0.2); opacity: 0.5; }
            50% { filter: grayscale(1) contrast(1.1) blur(8px) sepia(0.3); opacity: 0.3; }
        }

        .ink-overlay {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at center, transparent 30%, #000 100%),
                url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.6;
            pointer-events: none;
        }

        .scan-progress-box {
            margin-top: 60px;
            text-align: center;
            max-width: 300px;
        }

        .progress-text {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            letter-spacing: 8px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .gesture-hint {
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 4px;
            line-height: 2;
            transition: opacity 0.5s;
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .result-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 80px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 1000px) {
            .result-container { grid-template-columns: 1fr; overflow-y: auto; gap: 40px; padding-bottom: 80px; }
            .page { justify-content: flex-start; height: auto; padding: 20px;}
        }

        .art-box {
            width: 100%;
            aspect-ratio: 4/5;
            background: #0d0d0f;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .art-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 80%);
            opacity: 0.2;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        #art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
            animation: imageReveal 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes imageReveal {
            from { opacity: 0; filter: blur(30px) brightness(1.5); transform: scale(1.05); }
            to { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-size: 0.6rem;
            letter-spacing: 5px;
            opacity: 0.4;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .label::after { content: ""; height: 1px; flex: 1; background: rgba(255,255,255,0.08); }

        #fortune-title { font-family: var(--font-serif); font-size: 3rem; margin: 0; font-weight: 300; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 25px 0; font-weight: 300; opacity: 0.9; }
        #reason { font-size: 0.9rem; line-height: 2.4; opacity: 0.5; text-align: justify; font-weight: 300; letter-spacing: 0.5px; }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 20px 50px;
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 50px;
        }

        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        .manifesting-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #art-loading-text {
            margin-top: 20px;
            font-size: 0.6rem;
            letter-spacing: 6px;
            opacity: 0.4;
            font-family: var(--font-serif);
        }
    </style>
</head>
<body>

    <div class="aura-bg">
        <div class="aura-glow" id="bg-glow"></div>
    </div>

    <!-- 1. 首页 -->
    <div id="home-page" class="page active">
        <div class="home-decor">
            <div class="enso-circle"></div>
            <div class="side-text left">Celestial Echo // 鸣应</div>
            <div class="side-text right">Zen Perception // 觉知</div>
            <div class="ver-tag">Release v 1.5</div>
        </div>
        <h1>灵犀感知</h1>
        <p>万物气韵 · 映照本心</p>
        <button class="btn" onclick="goToScan()">开启感悟</button>
    </div>

    <!-- 2. 识别页 -->
    <div id="scan-page" class="page">
        <div class="scan-viewport">
            <video id="webcam" autoplay playsinline></video>
            <div class="ink-overlay"></div>
            <div id="flash" class="flash-overlay"></div>
        </div>
        <div class="scan-progress-box">
            <div class="progress-text" id="progress-val">等待缘起</div>
            <div class="gesture-hint" id="gesture-hint">请面对镜头，握紧拳头<br>心领神会，感应即刻开启</div>
        </div>
    </div>

    <!-- 3. 结果页 -->
    <div id="result-page" class="page">
        <div class="result-container">
            <div class="art-box" id="art-box">
                <div id="art-loading" style="text-align: center; z-index: 10;">
                    <div class="manifesting-circle" style="margin: 0 auto;"></div>
                    <div id="art-loading-text">画卷铺展中...</div>
                </div>
                <img id="art-img" alt="Gongbi Aesthetic Art">
            </div>
            <div class="info-box">
                <span class="label">Soul Resonance // 鸣应</span>
                <h2 id="fortune-title">---</h2>
                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="align-self: flex-start;">重寻宿命</button>
            </div>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk"; 
        const pages = {
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('capture-canvas');
        const bgGlow = document.getElementById('bg-glow');
        const progressVal = document.getElementById('progress-val');
        const gestureHint = document.getElementById('gesture-hint');
        const flash = document.getElementById('flash');
        const artLoadingText = document.getElementById('art-loading-text');

        let isAnalyzing = false;

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            progressVal.innerText = "正在观照...";
            gestureHint.style.opacity = "0.3";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) {
                alert("感悟需要视觉接入。");
                reset();
            }
        }

        async function detectGestureLoop() {
            if (isAnalyzing) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person in the image making a fist with their hand? Respond ONLY with 'YES' or 'NO'." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();

                if (text && text.includes("YES")) {
                    triggerSuccess();
                } else {
                    setTimeout(detectGestureLoop, 2000);
                }
            } catch (e) {
                setTimeout(detectGestureLoop, 3000);
            }
        }

        async function triggerSuccess() {
            isAnalyzing = true;
            flash.style.opacity = "0.8";
            progressVal.innerText = "灵犀已通";
            gestureHint.innerText = "感应到拳中志向，正在解读万象...";
            gestureHint.style.opacity = "0.8";

            setTimeout(() => {
                flash.style.opacity = "0";
                runAnalysis();
            }, 600);
        }

        function reset() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('art-loading').style.display = 'block';
            artLoadingText.innerText = "画卷铺展中...";
            showPage('home');
        }

        async function runAnalysis() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }

            try {
                const prompt = `Based on the clothing color and facial energy, provide a drink recommendation. 
                STRICT RULE: DO NOT mention "hands", "prayer", "gesture", "joining hands", or any description of the user's pose in the "reason" field. 
                Focus purely on the spiritual vibe and the essence of the drink.
                Return JSON in Chinese: {
                    "fortuneTitle":"4-char Chinese idiom",
                    "hexCode":"#HEX",
                    "drinkName":"Exquisite drink name",
                    "reason":"Chinese spiritual reason (purely about energy and drink, no pose talk)",
                    "visualKeywords":"English gender, facial features, hair style"
                }`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const json = await response.json();
                const data = JSON.parse(json.candidates[0].content.parts[0].text);
                updateUI(data);
                showPage('result');
                
                generateArt(base64, data);
            } catch (e) {
                console.error(e);
                reset();
            }
        }

        async function generateArt(base64, data, retryCount = 0) {
            const loadingMessages = [
                "正在研墨...",
                "起笔运势...",
                "渲染山水...",
                "画卷即将现世..."
            ];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                artLoadingText.innerText = loadingMessages[msgIdx % loadingMessages.length];
                msgIdx++;
            }, 3000);

            try {
                // 生图 Prompt 调整：姿态变更为拿着/品尝饮料，不再提及合掌
                const artPrompt = `A high-quality Traditional Chinese Gongbi (meticulous style) painting on weathered silk texture. 
                SUBJECT: A serene person (based on ${data.visualKeywords}) elegantly holding and DRINKING from a modern bubble tea cup with a straw. 
                ATTIRE: Wearing sophisticated ${data.hexCode} traditional Chinese robes. 
                SETTING: Sitting or standing in a peaceful primeval landscape with misty mountains and gnarled pines. 
                STYLE: Fine ink lines, rich mineral pigment, antique sepia patina, poetic atmosphere. NO prayer gesture, focus on the joy of the drink.`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } } ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                clearInterval(msgInterval);
                if (genBase64) {
                    const img = document.getElementById('art-img');
                    img.src = `data:image/png;base64,${genBase64}`;
                    img.onload = () => {
                        img.style.display = "block";
                        document.getElementById('art-loading').style.display = 'none';
                    };
                } else {
                    if (retryCount < 1) {
                        artLoadingText.innerText = "再次挥毫...";
                        setTimeout(() => generateArt(base64, data, retryCount + 1), 1000);
                    } else {
                        artLoadingText.innerText = "丹青难成，感悟已至";
                    }
                }
            } catch (e) {
                clearInterval(msgInterval);
                if (retryCount < 1) {
                    setTimeout(() => generateArt(base64, data, retryCount + 1), 1000);
                } else {
                    artLoadingText.innerText = "神思偶断，缘分已存";
                }
            }
        }

        function updateUI(data) {
            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            const drink = document.getElementById('drink-name');
            drink.innerText = data.drinkName;
            drink.style.color = data.hexCode;
            document.getElementById('reason').innerText = data.reason;
            bgGlow.style.background = `radial-gradient(circle, ${data.hexCode}22 0%, transparent 70%)`;
            document.documentElement.style.setProperty('--dynamic-color', `${data.hexCode}33`);
        }
    </script>
</body>
</html>
