<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 禅意视觉</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --dynamic-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            /* 恢复系统光标，确保点击精准度 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 画廊式全局边框 */
        body::before {
            content: "";
            position: fixed;
            inset: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 1000;
        }

        /* 极致颗粒质感 */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: 999;
        }

        /* 自定义禅意光标 */
        #custom-cursor {
            display: none; /* 隐藏模拟的中心点，改用真实光标 */
        }
        #cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            /* 使用更平滑的跟随动效 */
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1), 
                        width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
            transform: translate3d(-50%, -50%, 0);
        }

        /* 鼠标悬停在按钮上时，光环放大提示 */
        .btn:hover ~ #cursor-follower {
            width: 60px;
            height: 60px;
            border-color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 1.2s ease;
        }

        .page.active { display: flex; animation: fadeIn 1.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .aura-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        .aura-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            transition: all 4s ease-in-out;
        }

        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(3.5rem, 12vw, 5.5rem);
            letter-spacing: 2.5rem;
            font-weight: 200;
            margin-bottom: 30px;
            text-align: center;
            z-index: 10;
            position: relative;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #home-page p {
            opacity: 0.5;
            letter-spacing: 1rem;
            font-size: 0.95rem;
            margin-bottom: 60px;
            text-align: center;
            z-index: 10;
            position: relative;
            font-weight: 200;
            text-transform: uppercase;
        }

        .home-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .enso-circle {
            width: 600px;
            height: 600px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            position: absolute;
            animation: rotateEnso 30s linear infinite;
        }

        .enso-circle::before, .enso-circle::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
            opacity: 0.4;
        }
        .enso-circle::before { top: -1px; left: 50%; }
        .enso-circle::after { bottom: -1px; left: 50%; }

        @keyframes rotateEnso {
            from { transform: rotate(0deg) scale(0.95); }
            50% { transform: rotate(180deg) scale(1.05); }
            to { transform: rotate(360deg) scale(0.95); }
        }

        .side-info {
            position: absolute;
            left: 50px;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0.2;
            font-size: 0.55rem;
            letter-spacing: 3px;
        }

        .side-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 0.6rem;
            letter-spacing: 12px;
            opacity: 0.1;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .side-text.left { left: 40px; }
        .side-text.right { right: 40px; transform: translateY(-50%) rotate(90deg); }

        .ver-tag {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 0.55rem;
            opacity: 0.2;
            letter-spacing: 5px;
            writing-mode: vertical-rl;
        }

        .scan-viewport {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4;
            background: #000;
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 0 80px rgba(255,255,255,0.03);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: grayscale(1) contrast(0.9) brightness(1.1) blur(2px) sepia(0.2);
            opacity: 0.7;
            animation: inkBreathing 6s ease-in-out infinite;
        }

        @keyframes inkBreathing {
            0%, 100% { filter: grayscale(1) contrast(0.8) blur(3px) sepia(0.2); opacity: 0.5; }
            50% { filter: grayscale(1) contrast(1.1) blur(8px) sepia(0.3); opacity: 0.3; }
        }

        .ink-overlay {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at center, transparent 30%, #000 100%),
                url('https://www.transparenttextures.com/patterns/pinstripe.png');
            opacity: 0.6;
            pointer-events: none;
        }

        .scan-progress-box {
            margin-top: 60px;
            text-align: center;
            max-width: 300px;
        }

        .progress-text {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            letter-spacing: 8px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .gesture-hint {
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 4px;
            line-height: 2;
            transition: opacity 0.5s;
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .result-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 80px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 1000px) {
            .result-container { grid-template-columns: 1fr; overflow-y: auto; gap: 40px; padding-bottom: 80px; }
            .page { justify-content: flex-start; height: auto; padding: 20px;}
        }

        .art-box {
            width: 100%;
            aspect-ratio: 4/5;
            background: #0d0d0f;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* 瓶子叠加图层样式 */
        #product-overlay {
            position: absolute;
            right: 15%;
            bottom: 10%;
            width: 35%;
            z-index: 100;
            display: none;
            filter: contrast(1.05) brightness(0.95) drop-shadow(0 10px 30px rgba(0,0,0,0.5));
            animation: bottleFloat 6s ease-in-out infinite;
        }

        #product-overlay img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        @keyframes bottleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .art-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--dynamic-color) 0%, transparent 80%);
            opacity: 0.2;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        #art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
            animation: imageReveal 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes imageReveal {
            from { opacity: 0; filter: blur(30px) brightness(1.5); transform: scale(1.05); }
            to { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
        }

        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-size: 0.6rem;
            letter-spacing: 5px;
            opacity: 0.4;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .label::after { content: ""; height: 1px; flex: 1; background: rgba(255,255,255,0.08); }

        #fortune-title { font-family: var(--font-serif); font-size: 3rem; margin: 0; font-weight: 300; }
        #drink-name { font-family: var(--font-serif); font-size: 1.6rem; margin: 25px 0; font-weight: 300; opacity: 0.9; }
        #reason { font-size: 0.9rem; line-height: 2.4; opacity: 0.5; text-align: justify; font-weight: 300; letter-spacing: 0.5px; }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 20px 50px;
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 50px;
        }

        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        .manifesting-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #art-loading-text {
            margin-top: 20px;
            font-size: 0.6rem;
            letter-spacing: 6px;
            opacity: 0.4;
            font-family: var(--font-serif);
        }
    </style>
</head>

                <div id="product-overlay">
                    <img id="overlay-bottle-img" src="">

            </div>
            <div class="info-box">
                <span class="label">Soul Resonance // 鸣应</span>

                <div id="drink-name">---</div>
                <p id="reason">---</p>
                <button class="btn" onclick="reset()" style="align-self: flex-start;">重寻宿命</button>
            </div>
        </div>
    </div>

";
        const pages = {
            home: document.getElementById('home-page'),
            scan: document.getElementById('scan-page'),
            result: document.getElementById('result-page')
        };
        const video = document.getElementById('webcam');
        const cursor = document.getElementById('custom-cursor');
        const follower = document.getElementById('cursor-follower');

        document.addEventListener('mousemove', (e) => {
            // 让光环居中跟随真实鼠标
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
            
            // 背景光影随动
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            if (bgGlow) bgGlow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
        const canvas = document.getElementById('capture-canvas');
        const bgGlow = document.getElementById('bg-glow');
        const progressVal = document.getElementById('progress-val');
        const gestureHint = document.getElementById('gesture-hint');
        const flash = document.getElementById('flash');
        const artLoadingText = document.getElementById('art-loading-text');

        let isAnalyzing = false;

        function showPage(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            pages[pageId].classList.add('active');
        }

        async function goToScan() {
            showPage('scan');
            isAnalyzing = false;
            progressVal.innerText = "正在观照...";
            gestureHint.style.opacity = "0.3";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                video.srcObject = stream;
                detectGestureLoop();
            } catch (e) {
                alert("感悟需要视觉接入。");
                reset();
            }
        }

        async function detectGestureLoop() {
            if (isAnalyzing) return;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: "Is the person in the image giving a thumbs-up gesture? Respond ONLY with 'YES' or 'NO'." }, 
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ] 
                        }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toUpperCase();

                if (text && text.includes("YES")) {
                    triggerSuccess();
                } else {
                    setTimeout(detectGestureLoop, 2000);
                }
            } catch (e) {
                setTimeout(detectGestureLoop, 3000);
            }
        }

        async function triggerSuccess() {
            isAnalyzing = true;
            flash.style.opacity = "0.8";
            progressVal.innerText = "灵犀已通";
            gestureHint.innerText = "感应到积极之气，正在解读万象...";
            gestureHint.style.opacity = "0.8";

            setTimeout(() => {
                flash.style.opacity = "0";
                runAnalysis();
            }, 600);
        }

        function reset() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                video.srcObject = null;
            }
            document.getElementById('art-img').style.display = 'none';
            document.getElementById('art-loading').style.display = 'block';
            artLoadingText.innerText = "画卷铺展中...";
            showPage('home');
        }

        async function runAnalysis() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }

            try {
                // 推广版：结果固定为鸭屎香柠檬茶，不再消耗 API 识别文字
                const fixedData = {
                    "fortuneTitle": "灵犀通幽",
                    "hexCode": "#8fb935",
                    "drinkName": "鸭屎香柠檬茶",
                    "reason": "此茶气韵清雅高锐，如林间初雨。入口清爽涤烦，最衬此番观照本心之境。不仅是味蕾的邂逅，更是灵魂的鸣应。",
                    "visualKeywords": "serene person elegantly presenting a gift"
                };

                updateUI(fixedData);
                showPage('result');
                
                // 设置叠加层图片
                document.getElementById('overlay-bottle-img').src = `data:image/jpeg;base64,${bottleRefBase64}`;
                
                generateArt(base64, fixedData);
            } catch (e) {
                console.error(e);
                reset();
            }
        }

        async function generateArt(base64, data, retryCount = 0) {
            const loadingMessages = ["正在研墨...", "起笔运势...", "渲染山水...", "画卷即将现世..."];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                artLoadingText.innerText = loadingMessages[msgIdx % loadingMessages.length];
                msgIdx++;
            }, 3000);

            try {
                // 生图 Prompt 调整：为图层叠加预留空间，生成人物和背景，但不画瓶子
                const artPrompt = `A high-quality Traditional Chinese Gongbi (meticulous style) painting on weathered silk texture. 
                SUBJECT: A serene person (based on Image 1 features) in elegant traditional robes, standing gracefully in a peaceful primeval landscape with misty mountains. 
                COMPOSITION: The person is extending their hands as if presenting a precious treasure in the center-right foreground. 
                IMPORTANT: Leave a clear space in their hands. Focus on the poetic atmosphere, fine ink lines, and mineral pigments.`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [ { text: artPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } } ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                const result = await response.json();
                const genBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                clearInterval(msgInterval);
                if (genBase64) {
                    const img = document.getElementById('art-img');
                    img.src = `data:image/png;base64,${genBase64}`;
                    img.onload = () => {
                        img.style.display = "block";
                        document.getElementById('art-loading').style.display = 'none';
                        // 显示产品叠加层
                        document.getElementById('product-overlay').style.display = 'block';
                    };
                } else {
                    if (retryCount < 1) {
                        setTimeout(() => generateArt(base64, data, retryCount + 1), 1000);
                    }
                }
            } catch (e) {
                clearInterval(msgInterval);
            }
        }

        function updateUI(data) {
            document.getElementById('fortune-title').innerText = data.fortuneTitle;
            const drink = document.getElementById('drink-name');
            drink.innerText = data.drinkName;
            drink.style.color = data.hexCode;
            document.getElementById('reason').innerText = data.reason;
            bgGlow.style.background = `radial-gradient(circle, ${data.hexCode}22 0%, transparent 70%)`;
            document.documentElement.style.setProperty('--dynamic-color', `${data.hexCode}33`);
        }
    </script>
</body>
