<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀感知 · 禅意视觉</title>
    <style>
        :root {
            --primary-dark: #050505;
            --accent: #ffffff;
            --font-serif: "Noto Serif SC", "Songti SC", serif;
            --theme-color: #ffffff;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            background-color: var(--primary-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 蜿蜒过渡层 */
        #wave-transition {
            position: fixed;
            inset: 0;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            background: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #wave-transition.active { opacity: 1; pointer-events: all; }

        .wave-svg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .wave-path { fill: none; stroke-width: 1.5; stroke: rgba(255, 255, 255, 0.3); transition: all 1s ease; }

        #wave-transition .ink-content { 
            position: relative;
            z-index: 1001;
            color: #fff; 
            font-family: var(--font-serif); 
            font-size: 1.8rem; 
            letter-spacing: 12px; 
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            text-align: center;
        }
        #wave-transition.active .ink-content { opacity: 0.9; transform: translateY(0); }

        .aura-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); }
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, var(--theme-color) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.05;
            transition: all 4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page.active { display: flex; animation: fadeIn 1.5s cubic-bezier(0.2, 0, 0.2, 1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 首页样式 */
        #home-page h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            letter-spacing: 1.5rem;
            font-weight: 200;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 扫描容器 */
        .scan-container {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255,255,255,0.02);
        }
        .scan-container.success { transform: scale(0.9); filter: blur(20px) brightness(0.3); opacity: 0; transition: all 1s; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* 结果页布局 */
        .result-grid {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1100px;
            gap: 60px;
            align-items: center;
            justify-content: center;
        }

        .art-frame {
            flex: 0 0 380px;
            position: relative;
            aspect-ratio: 3/4;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        #art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .art-unfold-anim { animation: artUnfold 4s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        .info-panel {
            flex: 1;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        #res-title { font-family: var(--font-serif); font-size: 2.8rem; letter-spacing: 0.8rem; margin: 0 0 10px; font-weight: 200; color: #fff; }
        #res-drink { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 30px; font-weight: 300; display: inline-block; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        
        .content-section { margin-bottom: 25px; }
        .section-label { font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 3px; margin-bottom: 10px; display: block; font-family: var(--font-serif); }
        .section-text { font-size: 0.95rem; line-height: 1.8; color: rgba(255,255,255,0.75); text-align: justify; }

        .button-group { display: flex; gap: 15px; margin-top: 30px; position: relative; z-index: 10; }

        /* 移动端适配 */
        @media (max-width: 850px) {
            .page { height: auto; min-height: 100vh; padding: 60px 20px; overflow-y: auto; }
            .result-grid { flex-direction: column; align-items: center; gap: 40px; }
            .art-frame { flex: 0 0 auto; width: 100%; max-width: 340px; }
            .info-panel { text-align: center; align-items: center; }
            .section-text { text-align: center; }
            .button-group { width: 100%; justify-content: center; flex-wrap: wrap; }
        }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            padding: 12px 28px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.5s;
            white-space: nowrap;
        }
        .btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        .btn-primary { border-color: rgba(255,255,255,0.4); color: #fff; }

        /* 预览层 */
        #download-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #download-overlay.active { display: flex; }
        #preview-img { max-width: 100%; max-height: 75vh; box-shadow: 0 0 50px rgba(0,0,0,1); border: 1px solid rgba(255,255,255,0.1); }
        .download-hint { margin-top: 25px; font-family: var(--font-serif); font-size: 0.85rem; color: #888; letter-spacing: 4px; }

        /* 动画 */
        .loading-state { text-align: center; }
        .ripple-container { width: 80px; height: 80px; position: relative; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
        .ripple { position: absolute; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; animation: ripple-anim 3s infinite; }
        @keyframes ripple-anim { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100px; height: 100px; opacity: 0; } }
        @keyframes artUnfold { from { opacity: 0; filter: blur(20px); transform: scale(1.05); } to { opacity: 1; filter: blur(0); transform: scale(1); } }

        #audio-toggle { position: fixed; bottom: 25px; right: 25px; z-index: 100; background: none; border: none; color: rgba(255,255,255,0.2); font-size: 0.6rem; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="aura-bg"><div class="glow" id="main-glow"></div></div>
    
    <div id="download-overlay" onclick="this.classList.remove('active')">
        <img id="preview-img" src="" alt="灵犀艺术">
        <p class="download-hint">长按图片保存至相册</p>
        <button class="btn" style="margin-top: 30px;">关闭预览</button>
    </div>

    <div id="wave-transition">
        <svg class="wave-svg" id="wave-canvas"></svg>
        <div class="ink-content">
            灵犀微动
            <div style="font-size: 0.7rem; letter-spacing: 6px; opacity: 0.5; margin-top: 15px;">心之所向 · 见此本心</div>
        </div>
    </div>

    <div id="home-page" class="page active">
        <h1>灵犀感知</h1>
        <p style="letter-spacing: 8px; opacity: 0.3; font-size: 0.8rem; font-family: var(--font-serif); margin-bottom: 40px;">寻芳觅影 · 此时此刻</p>
        <button class="btn btn-primary" onclick="initExperience()">开启感知</button>
    </div>

    <div id="scan-page" class="page">
        <div class="scan-container" id="scan-box">
            <video id="webcam" autoplay playsinline></video>
            <div id="camera-switch-btn" onclick="switchCamera()" style="display:none; position:absolute; top:20px; right:20px; z-index:10; background:rgba(0,0,0,0.5); padding:8px; border-radius:50%; cursor:pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </div>
            <div style="position:absolute; inset:0; background:radial-gradient(circle, transparent 40%, #000 120%); display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;">
                <div id="camera-status" style="font-size:0.6rem; color:red; margin-bottom:10px;"></div>
                <div style="font-family:var(--font-serif); font-size:0.9rem; letter-spacing:4px; color:rgba(255,255,255,0.6); animation: pulse 2s infinite;">请双手合十</div>
            </div>
        </div>
        <p style="margin-top:40px; font-size:0.7rem; opacity:0.3; letter-spacing:4px; font-family:var(--font-serif);">静候缘起，开启觉知...</p>
        <div id="manual-trigger" style="display:none; margin-top: 15px;">
            <button class="btn btn-primary" onclick="forceProcess()">直接开始感悟</button>
        </div>
        <button class="btn" style="margin-top: 20px; font-size: 0.6rem; opacity: 0.6;" onclick="document.getElementById('manual-upload').click()">手动上传照片预览</button>
        <input type="file" id="manual-upload" style="display:none;" accept="image/*" onchange="handleManualUpload(event)">
    </div>

    <div id="result-page" class="page">
        <div class="result-grid">
            <div class="art-frame" onclick="showPreview()">
                <div id="art-loader" class="loading-state">
                    <div class="ripple-container">
                        <div class="ripple"></div>
                        <div class="ripple" style="animation-delay:1s"></div>
                    </div>
                    <div id="art-error-msg" style="font-size: 0.6rem; color: #666; margin-top: 10px; display: none;"></div>
                    <div id="art-loading-text" style="font-size: 0.65rem; opacity: 0.4; letter-spacing: 3px; font-family: var(--font-serif);">正在照见本心</div>
                </div>
                <img id="art-img">
            </div>
            <div class="info-panel">
                <span style="font-size:0.6rem; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:10px; display:block;">CELESTIAL ECHO // 鸣应</span>
                <h2 id="res-title">正在感悟</h2>
                <div id="res-drink">...</div>
                
                <div class="content-section">
                    <span class="section-label">【 气韵分析 】</span>
                    <p id="res-aura" class="section-text">正在感悟...</p>
                </div>

                <div class="content-section">
                    <span class="section-label">【 荐饮之由 】</span>
                    <p id="res-reason" class="section-text">正在尋味...</p>
                </div>

                <div class="button-group">
                    <!-- 确保查看大图按钮 ID 正确且在生成后显示 -->
                    <button id="view-full-btn" class="btn btn-primary" onclick="showPreview()" style="display:none;">查看全图</button>
                    <button class="btn" onclick="location.reload()">再续前缘</button>
                </div>
            </div>
        </div>
    </div>

    <button id="audio-toggle" onclick="toggleAudio()">AUDIO / ON</button>
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const apiKey = "AIzaSyBw0YbGjGrh2h2suRsTHNU8jXppFgDQkdk"; 
        const v = document.getElementById('webcam');
        const c = document.getElementById('hidden-canvas');
        const waveTrans = document.getElementById('wave-transition');
        const waveSvg = document.getElementById('wave-canvas');
        
        let isScanning = false, isMuted = false, currentArtB64 = "";
        let currentDeviceId = null, videoDevices = [];

        async function updateCameraList() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(d => d.kind === 'videoinput');
            if (videoDevices.length > 1) {
                document.getElementById('camera-switch-btn').style.display = 'block';
            }
        }

        async function switchCamera() {
            if (videoDevices.length < 2) return;
            const currentIndex = videoDevices.findIndex(d => d.deviceId === currentDeviceId);
            const nextIndex = (currentIndex + 1) % videoDevices.length;
            currentDeviceId = videoDevices[nextIndex].deviceId;
            startCamera(currentDeviceId);
        }

        async function startCamera(deviceId) {
            const statusEl = document.getElementById('camera-status');
            if (statusEl) statusEl.innerText = "";

            if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            const constraints = { 
                video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "user" } 
            };
            try {
                const s = await navigator.mediaDevices.getUserMedia(constraints);
                v.srcObject = s;
                await v.play(); // 显式调用播放
                isScanning = true;
                currentDeviceId = s.getVideoTracks()[0].getSettings().deviceId;
                requestAnimationFrame(detectionLoop);
            } catch (err) {
                console.warn("摄像头开启失败:", err);
                if (statusEl) statusEl.innerText = "摄像头启动失败: " + err.message;
                setTimeout(processAnalysis, 5000); // 延长演示模式等待时间
            }
        }

        async function speak(text) {
            if (isMuted) return;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `以极具禅意、优雅且缓慢的语气朗读这段话：${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } } } 
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio(URL.createObjectURL(new Blob([createWavHeader(pcmData.length, 24000), Uint8Array.from(atob(pcmData), char => char.charCodeAt(0)).buffer], { type: 'audio/wav' })));
                audio.play();
            } catch (e) {}
        }

        function createWavHeader(l, r) {
            const b = new ArrayBuffer(44), v = new DataView(b);
            v.setUint32(0, 0x46464952, true); v.setUint32(4, 36 + l, true); v.setUint32(8, 0x45564157, true);
            v.setUint32(12, 0x20746d66, true); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
            v.setUint16(22, 1, true); v.setUint32(24, r, true); v.setUint32(28, r * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); v.setUint32(36, 0x61746164, true); v.setUint32(40, l, true);
            return b;
        }

        function initExperience() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('scan-page').classList.add('active');
            
            speak("闭上眼，深呼吸。当你心神安定时，双手合十，让我照见你的气场。");

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn("浏览器不支持摄像头或处于非安全环境");
                setTimeout(processAnalysis, 3000); 
                return;
            }

            updateCameraList();
            startCamera();
        }

        let lastDetect = 0;
        async function detectionLoop(now) {
            if (!isScanning) return;
            
            // 摄像头开启 2 秒后自动进入下一步，无需手势识别
            if (now - lastDetect > 2000) {
                forceProcess();
            }
            requestAnimationFrame(detectionLoop);
        }

        function forceProcess() {
            isScanning = false;
            document.getElementById('scan-box').classList.add('success');
            setTimeout(() => { waveTrans.classList.add('active'); setTimeout(processAnalysis, 2000); }, 300);
        }

        function handleManualUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const b64 = event.target.result.split(',')[1];
                // 模拟扫描成功流程
                isScanning = false;
                document.getElementById('scan-box').classList.add('success');
                waveTrans.classList.add('active');
                
                // 直接进入分析流程，传入手动上传的图片
                processManualAnalysis(b64);
            };
            reader.readAsDataURL(file);
        }

        async function processManualAnalysis(highRes) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "请作为一名禅修大师，分析图中人物的能量场。请严格返回 JSON 格式：{ \"fortuneTitle\": \"四字气韵标题\", \"drinkName\": \"推荐饮品名称\", \"hexColor\": \"契合气场的颜色十六进制码\", \"auraAnalysis\": \"富有诗意的气韵分析（中文）\", \"recommendationReason\": \"推荐此饮品的深层心灵理由（中文）\", \"gender\": \"图中人物性别(男/女)\" }" },
                            { inlineData: { mimeType: "image/jpeg", data: highRes } }
                        ] }],
                        generationConfig: { }
                    })
                });

                const resJson = await res.json();
                if (resJson.error) {
                    throw new Error(resJson.error.message || "API 调用失败");
                }
                const data = JSON.parse(resJson.candidates[0].content.parts[0].text);
                updateResultUI(data, highRes);
            } catch (e) { 
                console.error("分析失败:", e);
                // 自动降级到演示数据，不再报错
                const dummyData = {
                    fortuneTitle: "灵犀通幽",
                    drinkName: "雨前龙井",
                    hexColor: "#99bc8c",
                    auraAnalysis: "气韵清雅，如林间初雨，避世而独立。心境平和，正是照见本心之时刻。",
                    recommendationReason: "龙井之淡，最衬此番清净心境，涤烦疗渴，回味甘甜。",
                    gender: "女"
                };
                updateResultUI(dummyData, highRes);
            }
        }

        function updateResultUI(data, highRes) {
            document.getElementById('res-title').innerText = data.fortuneTitle;
            document.getElementById('res-drink').innerText = data.drinkName;
            document.getElementById('res-drink').style.color = data.hexColor;
            document.getElementById('res-aura').innerText = data.auraAnalysis;
            document.getElementById('res-reason').innerText = data.recommendationReason;
            document.getElementById('main-glow').style.background = `radial-gradient(circle, ${data.hexColor}33 0%, transparent 70%)`;

            document.getElementById('scan-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');
            setTimeout(() => { waveTrans.classList.remove('active'); }, 1000);
            
            speak(`缘分已至。${data.fortuneTitle}。${data.auraAnalysis}。为你荐饮 ${data.drinkName}，因为 ${data.recommendationReason}`);
            generateArt(highRes, data);
        }

        async function processAnalysis() {
            c.width = 640; c.height = 480; 
            const ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0);
            const highRes = c.toDataURL('image/jpeg', 0.8).split(',')[1];
            if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());

            processManualAnalysis(highRes);
        }

        async function generateArt(b64, d) {
            const loaderText = document.getElementById('art-loading-text');
            const errorMsg = document.getElementById('art-error-msg');
            const prompt = `这是一幅高水准的中国工笔画风格艺术作品。请【严格保留图中人物的面部特征、五官轮廓、发型和神态】，将${d.gender === '男' ? '他' : '她'}描绘成一位端着${d.drinkName}的禅意人物。背景为留白的园林景观。色调以${d.hexColor}为主。绢本质感，线条细腻，意境深远。`;
            
            try {
                // 必须使用 v1beta 才能生成图片
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: b64 } }] }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });
                
                const resJson = await response.json();
                if (resJson.error) throw new Error(resJson.error.message);

                const imgData = resJson.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if (imgData) {
                    currentArtB64 = `data:image/png;base64,${imgData}`;
                    const artImg = document.getElementById('art-img');
                    const previewImg = document.getElementById('preview-img');
                    const viewBtn = document.getElementById('view-full-btn');
                    const loader = document.getElementById('art-loader');

                    artImg.src = currentArtB64;
                    previewImg.src = currentArtB64;
                    
                    artImg.onload = () => {
                        loader.style.display = 'none';
                        artImg.style.display = 'block';
                        artImg.classList.add('art-unfold-anim');
                        viewBtn.style.display = 'inline-block';
                    };
                } else {
                    throw new Error("模型未返回图像数据");
                }
            } catch (e) {
                console.error("生成艺术画失败", e);
                loaderText.innerText = "缘分尚浅，暂未成画";
                errorMsg.innerText = e.message;
                errorMsg.style.display = "block";
            }
        }

        function showPreview() {
            if (currentArtB64) {
                document.getElementById('download-overlay').classList.add('active');
            }
        }

        // 背景动态线条
        const lines = [];
        for (let i = 0; i < 12; i++) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.classList.add("wave-path"); waveSvg.appendChild(p);
            lines.push({ el: p, off: Math.random() * 500, y: (window.innerHeight / 12) * i });
        }

        function draw() {
            const w = window.innerWidth, h = window.innerHeight;
            waveSvg.setAttribute("viewBox", `0 0 ${w} ${h}`);
            lines.forEach(l => {
                let d = `M -50 ${l.y}`;
                for (let x = -50; x <= w + 50; x += 50) d += ` L ${x} ${l.y + Math.sin(x * 0.002 + l.off) * 60}`;
                l.el.setAttribute("d", d);
                l.off += 0.015;
            });
            requestAnimationFrame(draw);
        }
        draw();

        function toggleAudio() {
            isMuted = !isMuted;
            document.getElementById('audio-toggle').innerText = isMuted ? "AUDIO / OFF" : "AUDIO / ON";
        }
    </script>
</body>
</html>
